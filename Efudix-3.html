<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב טיפול יומי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom Checkbox Styling */
        .custom-checkbox input:checked + div {
            background-color: #059669;
            border-color: #059669;
        }
        
        /* Smooth transitions */
        .progress-bar {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s ease;
        }

        .phase-divider {
            position: relative;
            text-align: center;
            margin: 2.5rem 0 1.5rem 0;
        }
        .phase-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #cbd5e1;
            z-index: 0;
        }
        .phase-divider span {
            position: relative;
            background: #f8fafc;
            padding: 0.5rem 1.25rem;
            color: #0f172a;
            font-size: 1.125rem;
            font-weight: 700;
            border: 2px solid #cbd5e1;
            border-radius: 999px;
            z-index: 1;
        }

        /* Modal Animation */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .modal-content {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gallery-modal-content {
            animation: slideUp 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        /* Hide scrollbar for gallery */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <!-- Sticky Header with Progress -->
    <header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur shadow-sm z-50 transition-all duration-300">
        <div class="max-w-md mx-auto px-4 py-3">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h1 class="text-lg font-bold text-slate-900" id="header-title">המסע שלי</h1>
                    <p class="text-xs text-slate-500">מתחילים ב-16.2.26</p>
                </div>
                <div class="flex flex-col items-end gap-1.5">
                    <div class="text-2xl font-bold transition-colors duration-300" id="percent-display">0%</div>
                    <!-- Compact Buttons Row -->
                    <div class="flex flex-wrap justify-end gap-1.5 mt-0.5">
                        <!-- Settings Button -->
                        <button onclick="openSettings()" class="text-[11px] bg-slate-100 text-slate-600 px-2 py-1.5 rounded-md border border-slate-200 font-medium active:bg-slate-200 transition-colors flex items-center gap-1 shadow-sm">

                        <!-- Documentation/Gallery Button -->

                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            תיעוד
                        </button>
                        <!-- Daily Tip Button -->
                        <button onclick="showDailyTip()" class="text-[11px] bg-amber-50 text-amber-600 px-2 py-1.5 rounded-md border border-amber-100 font-medium active:bg-amber-100 transition-colors flex items-center gap-1 shadow-sm">
                            ✨ טיפ
                        </button>
                        <!-- Calendar Button -->
                        <button onclick="downloadAndShowMessage()" class="text-[11px] bg-indigo-50 text-indigo-600 px-2 py-1.5 rounded-md border border-indigo-100 font-medium active:bg-indigo-100 transition-colors flex items-center gap-1 shadow-sm">

                            יומן
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden mt-1">
                <div id="progress-bar" class="h-full w-0 progress-bar rounded-full" style="background-color: #ef4444;"></div>

            <!-- New Phase Remaining Status -->

            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto px-4 pt-[11.5rem] space-y-4" id="app-container">

    <!-- Settings Modal -->

                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">Bot Token:</label>

    <!-- Motivational Modal -->

            <button id="modal-btn" onclick="closeModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-medium active:scale-95 transition-transform disabled:opacity-50 disabled:cursor-not-allowed">

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="fixed inset-0 bg-slate-900/40 z-[70] hidden flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-md h-[85vh] sm:h-[80vh] shadow-2xl gallery-modal-content flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-slate-100">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <svg class="w-5 h-5 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>

            <div class="flex-1 overflow-y-auto p-4 space-y-6 bg-slate-100 no-scrollbar" id="gallery-container">

                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /></svg>

    <!-- Confirm Photo Date Modal -->
    <div id="photo-date-modal" class="fixed inset-0 bg-slate-900/80 z-[80] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl modal-content flex flex-col overflow-hidden">
            <div class="bg-slate-900 w-full max-h-[50vh] flex items-center justify-center overflow-hidden">
                <img id="photo-preview" src="" alt="Preview" class="w-full h-full object-contain">
            </div>
            <div class="p-5 text-center">
                <h3 class="text-lg font-bold text-slate-900 mb-1">מתי התמונה צולמה?</h3>
                <p class="text-xs text-slate-500 mb-4">תוכל לתקן את התאריך אם הועלתה מאלבום</p>
                
                <input type="date" id="photo-date-input" class="w-full text-center text-lg font-medium text-slate-800 bg-slate-50 border border-slate-200 rounded-lg py-2 mb-2 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500">
                <p id="photo-day-preview" class="text-sm font-bold text-teal-600 mb-5 bg-teal-50 py-1 rounded-md"></p>
                
                <div class="flex gap-3">
                    <button id="cancel-photo-btn" onclick="cancelPhotoUpload()" class="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-xl font-medium active:bg-slate-200 transition-colors">
                        ביטול
                    </button>
                    <button id="save-photo-btn" onclick="savePhotoWithDate()" class="flex-1 bg-teal-600 text-white py-2.5 rounded-xl font-medium active:bg-teal-700 transition-colors shadow-sm flex items-center justify-center gap-2">
                        <span>שמור בתיעוד</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const START_DATE = new Date(2026, 1, 16);
        const PHASE_1_DAYS = 21;
        const PHASE_2_DAYS = 14;
        const TOTAL_DAYS = PHASE_1_DAYS + PHASE_2_DAYS;
        const TOTAL_CHECKS = TOTAL_DAYS * 2; 
        
        // --- State Management ---
        let state = JSON.parse(localStorage.getItem('treatmentState')) || {};
        let lastMilestone = parseInt(localStorage.getItem('lastMilestone')) || 0;
        let lastTipIndex = -1; 
        let currentTempPhoto = null;

        // Settings
        let patientName = localStorage.getItem('patientName') || '';
        let telegramToken = localStorage.getItem('telegramToken') || '';
        let telegramChatId = localStorage.getItem('telegramChatId') || '';

        // --- Database Setup ---
        let db;
        const dbName = "TreatmentTrackerDB";
        
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onerror = (event) => reject(event.target.error);
                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("photos")) {
                        const store = db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
                        store.createIndex("date", "date", { unique: false });
                    }
                };
            });
        }

        function savePhotoToDB(photoData) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(["photos"], "readwrite");
                const store = transaction.objectStore("photos");
                const request = store.add(photoData);
                request.onsuccess = () => resolve();
                request.onerror = () => reject();
            });
        }

        function getPhotosFromDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(["photos"], "readonly");
                const store = transaction.objectStore("photos");
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject();
            });
        }

        function deletePhotoFromDB(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(["photos"], "readwrite");
                const store = transaction.objectStore("photos");
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject();
            });
        }

        // --- Daily Tips & Milestones ---
        const milestoneMessages = {
            10: "התחלה נהדרת! 10% כבר מאחורייך. כל מסע גדול מתחיל בצעד קטן.",
            20: "וואו! חמישית מהדרך הושלמה. ההתמדה שלך מרשימה מאוד!",
            30: "30% מאחורייך! ההרגל כבר מתחיל להתבסס, תמשיך ככה.",
            40: "כמעט בחצי הדרך! איזה כוח רצון ונחישות אתה מפגין.",
            50: "חצי דרך! זה הזמן לטפוח לעצמך על השכם. חצי מהעבודה כבר מאחורייך.",
            60: "עברת את החצי! הירידה מתחילה מעכשיו, והתוצאות כבר בדרך.",
            70: "70% הושלמו! נשאר רק עוד קצת, אל תוריד את הרגל מהגז.",
            80: "ממש קרובים לקו הסיום! 80% מאחורייך, זה כבר ממש קרוב.",
            90: "זהו, הישורת האחרונה! עוד מאמץ קטן וסיימנו.",
            100: "ניצחון! סיימת את כל הטיפולים בהצלחה אדירה! מגיע לך לחגוג."
        };

        const dailyTips = [
            "תזכורת קטנה: שתיית כוס מים עם הטיפול עוזרת לספיגה ולתחושת רעננות!",
            "כל צעד קטן נחשב. ההתמדה שלך היום בונה את הבריאות של מחר.",
            "כדאי לשים לעצמך תזכורת קבועה בטלפון, ככה לא צריך לזכור הכל בראש.",
            "חבר את הטיפול להרגל קיים - למשל מיד אחרי צחצוח שיניים או עם קפה של בוקר.",
            "יום קשה? זה בסדר. העיקר שסימנת 'בוצע' והמשכת במסע.",
            "הגוף שלך מודה לך על כל טיפול שאתה לא מפספס.",
            "גם אם פספסת פעם אחת, לא נורא. פשוט ממשיכים כרגיל בטיפול הבא!",
            "הוקר תודה לעצמך על ההשקעה בבריאות שלך. זה לא מובן מאליו.",
            "טיפ אלופים: שים את הטיפול במקום בולט לעין שאי אפשר לפספס.",
            "שגרה היא המפתח להצלחה. אתה בונה עכשיו שגרה מנצחת!"
        ];

        // --- Initialization ---
        async function init() {
            updateHeaderTitle();
            
            try {
                await initDB();
            } catch(e) {
                console.error("Could not initialize IndexedDB.");
            }

            const container = document.getElementById('app-container');
            container.innerHTML = '';

            let currentDate = new Date(START_DATE);

            for (let i = 1; i <= TOTAL_DAYS; i++) {
                if (i === PHASE_1_DAYS + 1) {
                    const divider = document.createElement('div');
                    divider.className = 'phase-divider';
                    divider.innerHTML = '<span>שלב ב\' - חיזוק (14 יום נוספים)</span>';
                    container.appendChild(divider);
                }

                const dayId = `day-${i}`;
                const dateStr = formatDisplayDate(currentDate);
                
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl p-4 shadow-sm border border-slate-200 ${i > PHASE_1_DAYS ? 'bg-indigo-50/30' : ''}`;
                
                const dayHeader = document.createElement('div');
                dayHeader.className = 'flex justify-between items-center mb-3 pb-2 border-b border-slate-100';
                
                dayHeader.innerHTML = `
                    <span class="font-bold text-slate-900">יום ${i}</span>
                    <span class="font-bold text-slate-900">${dateStr}</span>
                `;
                card.appendChild(dayHeader);

                const inputsGrid = document.createElement('div');
                inputsGrid.className = 'grid grid-cols-2 gap-4';

                inputsGrid.appendChild(createCheckbox(i, 'morning', 'בוקר', '☀️'));
                inputsGrid.appendChild(createCheckbox(i, 'evening', 'ערב', '🌙'));

                card.appendChild(inputsGrid);
                container.appendChild(card);

                currentDate.setDate(currentDate.getDate() + 1);
            }

            updateProgress(false); 
        }

        // --- Settings Management ---
        function updateHeaderTitle() {
            const titleEl = document.getElementById('header-title');
            titleEl.innerText = patientName ? `המסע של ${patientName}` : 'המסע שלי';
        }

        function openSettings() {
            document.getElementById('setting-name').value = patientName;
            document.getElementById('setting-token').value = telegramToken;
            document.getElementById('setting-chatid').value = telegramChatId;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveSettings() {
            const newPatientName = document.getElementById('setting-name').value.trim();
            const newTelegramToken = document.getElementById('setting-token').value.trim().replace(/^bot/i, '');
            const newTelegramChatId = document.getElementById('setting-chatid').value.trim();

            if (newTelegramChatId !== telegramChatId) {
                localStorage.removeItem('telegramThreadId');
            }

            patientName = newPatientName;
            telegramToken = newTelegramToken;
            telegramChatId = newTelegramChatId;

            localStorage.setItem('patientName', patientName);
            localStorage.setItem('telegramToken', telegramToken);
            localStorage.setItem('telegramChatId', telegramChatId);

            updateHeaderTitle();
            closeSettings();
        }

        // --- Main Functions (Checkboxes, Progress, Dates) ---
        function formatDisplayDate(date) {
            const d = date.getDate();
            const m = date.getMonth() + 1;
            const y = date.getFullYear().toString().slice(-2);
            return `${d}.${m}.${y}`;
        }
        
        function formatInputDate(date) {
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            return `${y}-${m}-${d}`;
        }

        function calculateDayFromDateStr(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const selectedDate = new Date(y, m - 1, d);
            selectedDate.setHours(0,0,0,0);
            
            const startDate = new Date(START_DATE);
            startDate.setHours(0,0,0,0);
            
            const diffTime = selectedDate - startDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return "לפני תחילת הטיפול";
            if (diffDays >= TOTAL_DAYS) return `יום ${diffDays + 1} (לאחר סיום)`;
            return `יום ${diffDays + 1}`;
        }

        function formatDaysRemaining(days) {
            if (days === 0) return '0 ימים';
            if (days % 1 === 0.5) {
                return Math.floor(days) === 0 ? 'חצי יום' : `${Math.floor(days)} וחצי ימים`;
            }
            return `${days} ימים`;
        }

        function createCheckbox(day, time, labelText, icon) {
            const id = `${day}-${time}`;
            const isChecked = state[id] === true;

            const wrapper = document.createElement('label');
            wrapper.className = 'custom-checkbox cursor-pointer relative group';

            const input = document.createElement('input');
            input.type = 'checkbox';
            input.className = 'sr-only'; 
            input.checked = isChecked;
            input.onchange = (e) => toggleCheck(id, e.target.checked);

            const visual = document.createElement('div');
            visual.className = `
                h-14 rounded-lg border-2 transition-all duration-200 flex items-center px-3 gap-3
                ${isChecked ? 'bg-emerald-600 border-emerald-600' : 'bg-white border-slate-300 hover:border-slate-400'}
            `;
            
            const checkIcon = `
                <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors
                    ${isChecked ? 'bg-white border-white' : 'border-slate-300 bg-white'}">
                    ${isChecked ? '<svg class="w-3.5 h-3.5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>' : ''}
                </div>
            `;

            visual.innerHTML = `
                ${checkIcon}
                <div class="flex flex-col">
                    <span class="text-xs font-medium ${isChecked ? 'text-emerald-50' : 'text-slate-500'}">${icon} ${labelText}</span>
                    <span class="text-sm font-semibold ${isChecked ? 'text-white' : 'text-slate-700'}">
                        ${isChecked ? 'בוצע' : 'לביצוע'}
                    </span>
                </div>
            `;

            wrapper.appendChild(input);
            wrapper.appendChild(visual);

            input.addEventListener('change', () => {
                 const isNowChecked = input.checked;
                 const div = wrapper.querySelector('div');
                 const iconDiv = div.firstElementChild;
                 const labelSpan = div.lastElementChild.firstElementChild;
                 const statusSpan = div.lastElementChild.lastElementChild;

                 if (isNowChecked) {
                     div.className = 'h-14 rounded-lg border-2 transition-all duration-200 flex items-center px-3 gap-3 bg-emerald-600 border-emerald-600';
                     iconDiv.className = 'w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors bg-white border-white';
                     iconDiv.innerHTML = '<svg class="w-3.5 h-3.5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>';
                     labelSpan.className = 'text-xs font-medium text-emerald-50';
                     statusSpan.className = 'text-sm font-semibold text-white';
                     statusSpan.innerText = 'בוצע';
                 } else {
                     div.className = 'h-14 rounded-lg border-2 transition-all duration-200 flex items-center px-3 gap-3 bg-white border-slate-300 hover:border-slate-400';
                     iconDiv.className = 'w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors border-slate-300 bg-white';
                     iconDiv.innerHTML = '';
                     labelSpan.className = 'text-xs font-medium text-slate-500';
                     statusSpan.className = 'text-sm font-semibold text-slate-700';
                     statusSpan.innerText = 'לביצוע';
                 }
            });

            return wrapper;
        }

        function toggleCheck(id, isChecked) {
            state[id] = isChecked;
            localStorage.setItem('treatmentState', JSON.stringify(state));
            updateProgress(true);
        }

        function updateProgress(showModal) {
            const checkedCount = Object.values(state).filter(Boolean).length;
            const percentage = Math.floor((checkedCount / TOTAL_CHECKS) * 100);

            document.getElementById('percent-display').innerText = `${percentage}%`;
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = `${percentage}%`;
            const hue = (percentage / 100) * 120; 
            progressBar.style.backgroundColor = `hsl(${hue}, 80%, 50%)`;
            document.getElementById('percent-display').style.color = `hsl(${hue}, 70%, 35%)`;

            let p1Checked = 0;
            let p2Checked = 0;

            for (let i = 1; i <= PHASE_1_DAYS; i++) {
                if (state[`${i}-morning`]) p1Checked++;
                if (state[`${i}-evening`]) p1Checked++;
            }
            for (let i = PHASE_1_DAYS + 1; i <= TOTAL_DAYS; i++) {
                if (state[`${i}-morning`]) p2Checked++;
                if (state[`${i}-evening`]) p2Checked++;
            }

            const p1TotalChecks = PHASE_1_DAYS * 2;
            const p2TotalChecks = PHASE_2_DAYS * 2;
            const p1RemChecks = p1TotalChecks - p1Checked;
            const p2RemChecks = p2TotalChecks - p2Checked;
            const p1RemPct = Math.round((p1RemChecks / p1TotalChecks) * 100);
            const p2RemPct = Math.round((p2RemChecks / p2TotalChecks) * 100);

            let statusHtml = '';

            if (p1RemChecks > 0) {
                statusHtml += `
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">עד סוף שלב א':</span>
                        <span class="font-bold text-slate-800">${formatDaysRemaining(p1RemChecks / 2)} ו-${p1RemPct}%</span>
                    </div>`;
            } else {
                statusHtml += `
                    <div class="flex justify-between items-center text-emerald-600 font-medium">
                        <span>סוף שלב א':</span>
                        <span>✅ הושלם בהצלחה!</span>
                    </div>`;
            }

            if (p2RemChecks > 0) {
                statusHtml += `
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">עד סיום (שלב ב'):</span>
                        <span class="font-bold text-slate-800">${formatDaysRemaining(p2RemChecks / 2)} ו-${p2RemPct}%</span>
                    </div>`;
            } else if (p1RemChecks === 0 && p2RemChecks === 0) {
                 statusHtml += `
                    <div class="flex justify-between items-center text-emerald-600 font-medium border-t border-emerald-100 pt-1 mt-1">
                        <span>סיום (שלב ב'):</span>
                        <span>🏆 סיימת הכל!</span>
                    </div>`;
            } else {
                 statusHtml += `
                    <div class="flex justify-between items-center text-emerald-600 font-medium border-t border-emerald-100 pt-1 mt-1">
                        <span>סיום (שלב ב'):</span>
                        <span>✅ שלב ב' הושלם!</span>
                    </div>`;
            }

            document.getElementById('phase-status').innerHTML = statusHtml;

            if (showModal) {
                if (percentage > lastMilestone && percentage % 10 === 0) {
                    lastMilestone = percentage;
                    localStorage.setItem('lastMilestone', lastMilestone);
                    triggerEncouragement(percentage);
                } 
                else if (percentage < lastMilestone) {
                    lastMilestone = Math.floor(percentage / 10) * 10;
                    localStorage.setItem('lastMilestone', lastMilestone);
                }
            }
        }

        async function handleDeletePhoto(id) {
            if(confirm("האם למחוק תמונה זו מהמכשיר? (התמונה לא תימחק מהענן אם כבר נשלחה)")) {
                await deletePhotoFromDB(id);
                renderGallery(); 
            }
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_DIM = 1600;

                        if (width > height && width > MAX_DIM) {
                            height *= MAX_DIM / width;
                            width = MAX_DIM;
                        } else if (height > MAX_DIM) {
                            width *= MAX_DIM / height;
                            height = MAX_DIM;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85)); 
                    };
                };
            });
        }

        async function handlePhotoSelected(event) {
            const file = event.target.files[0];
            if (!file) return;

            event.target.value = '';

            document.getElementById('photo-preview').src = "";
            document.getElementById('photo-date-modal').classList.remove('hidden');
            
            const base64Image = await compressImage(file);
            currentTempPhoto = base64Image;

            document.getElementById('photo-preview').src = base64Image;
            
            const dateInput = document.getElementById('photo-date-input');
            dateInput.value = formatInputDate(new Date());
            
            updatePhotoDayPreview();
        }

        function updatePhotoDayPreview() {
            const dateStr = document.getElementById('photo-date-input').value;
            if(!dateStr) return;
            const dayLabel = calculateDayFromDateStr(dateStr);
            document.getElementById('photo-day-preview').innerText = `תסומן כ: ${dayLabel}`;
        }
        
        document.getElementById('photo-date-input').addEventListener('change', updatePhotoDayPreview);

        function cancelPhotoUpload() {
            currentTempPhoto = null;
            document.getElementById('photo-date-modal').classList.add('hidden');
        }

        // Fetch or Create Telegram Topic
        async function getOrCreateTelegramTopic() {
            let threadId = localStorage.getItem('telegramThreadId');
            if (threadId) return threadId;

            const dispName = patientName || 'תיק מטופל ללא שם';
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${telegramToken}/createForumTopic`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: telegramChatId,
                        name: dispName
                    })
                });

                const data = await response.json();
                
                if (!response.ok || !data.ok) {
                    console.error('Error creating topic:', data);
                    // Instead of throwing an error here, check if it's the "not enough rights" error
                    // which means the bot isn't an admin in the group.
                    if (data.error_code === 400 && data.description.includes("not enough rights")) {
                       throw new Error("לבוט אין הרשאת 'ניהול נושאים' (Manage Topics) בקבוצה. אנא הגדר את הבוט כמנהל בקבוצה בטלגרם עם הרשאה זו ונסה שוב.");
                    }
                    throw new Error(data.description || 'שגיאה ביצירת הנושא בקבוצה.');
                }

                threadId = data.result.message_thread_id;
                localStorage.setItem('telegramThreadId', threadId);
                return threadId;
            } catch (err) {
                throw err; // Propagate the specific error message
            }
        }

        // Send to Telegram Logic
        async function sendPhotoToTelegram(base64Data, dateStr, dayLabel) {
            if (!telegramToken || !telegramChatId) return false;

            try {
                const threadId = await getOrCreateTelegramTopic();

                const res = await fetch(base64Data);
                const blob = await res.blob();

                const [y, m, d] = dateStr.split('-');
                const displayDate = `${d}.${m}.${y.slice(-2)}`;
                const dispName = patientName || 'לא הוגדר שם';

                const caption = `📸 תיעוד רפואי חדש\n👤 מטופל: ${dispName}\n📅 תאריך: ${displayDate}\n⏳ שלב: ${dayLabel}`;

                const formData = new FormData();
                formData.append('chat_id', telegramChatId);
                formData.append('message_thread_id', threadId);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', caption);

                const response = await fetch(`https://api.telegram.org/bot${telegramToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Telegram error:', errorText);
                    
                    try {
                        const errorData = JSON.parse(errorText);
                        if (errorData.error_code === 404) {
                            alert('שגיאה: ה-Token שגוי. אנא בדוק בהגדרות.');
                        } else if (errorData.error_code === 400) {
                            if (errorData.description.includes("forum")) {
                                alert('שגיאה: קבוצת הטלגרם אינה מוגדרת כפורום! פתח את הגדרות הקבוצה בטלגרם והפעל "Topics/נושאים".');
                            } else if (errorData.description.includes("thread not found")) {
                                localStorage.removeItem('telegramThreadId');
                                alert('הנושא (Topic) נמחק בטלגרם. נסה ללחוץ שוב לשמירה כדי שניצור אותו מחדש.');
                            } else {
                                alert(`שגיאה בחיבור לטלגרם: ${errorData.description}`);
                            }
                        } else {
                            alert('שגיאה מטלגרם: ' + errorData.description);
                        }
                    } catch (e) {
                        alert('שגיאה בלתי צפויה בעת שליחת התמונה לטלגרם.');
                    }
                    return false;
                }
                return true;
            } catch (err) {
                console.error('Fetch error:', err);
                alert(`שגיאת תקשורת: ${err.message || 'אנא בדוק את החיבור לאינטרנט'}`);
                return false;
            }
        }

        async function savePhotoWithDate() {
            if (!currentTempPhoto) return;
            
            const dateStr = document.getElementById('photo-date-input').value;
            if (!dateStr) {
                alert("אנא בחר תאריך לתמונה");
                return;
            }

            const dayLabel = calculateDayFromDateStr(dateStr);
            
            const saveBtn = document.getElementById('save-photo-btn');
            const cancelBtn = document.getElementById('cancel-photo-btn');
            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            cancelBtn.disabled = true;
            
            let uploadSuccess = false;

            if (telegramToken && telegramChatId) {
                saveBtn.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    פותח נושא ושולח...
                `;
                
                uploadSuccess = await sendPhotoToTelegram(currentTempPhoto, dateStr, dayLabel);
                
                // If telegram upload failed, we still want to give the user a chance to cancel or retry,
                // so we don't save to local DB and close the modal automatically if it failed to send to telegram (when configured).
                if (!uploadSuccess) {
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                    cancelBtn.disabled = false;
                    return; // Stop here if telegram failed
                }
            }

            // Save to Local DB
            const newPhoto = {
                date: dateStr,
                dayLabel: dayLabel,
                imageData: currentTempPhoto
            };
            await savePhotoToDB(newPhoto);
            
            // Cleanup
            saveBtn.innerHTML = originalText;
            saveBtn.disabled = false;
            cancelBtn.disabled = false;
            currentTempPhoto = null;
            document.getElementById('photo-date-modal').classList.add('hidden');
            
            if (!document.getElementById('gallery-modal').classList.contains('hidden')) {
                renderGallery();
            } else {
                openGallery();
            }

            if (telegramToken && telegramChatId && uploadSuccess) {
                setTimeout(() => {
                    showMessageModal('הצלחנו! 🎉', '<p class="text-slate-600 font-medium">התמונה נשמרה באפליקציה ונשלחה בהצלחה לנושא הייעודי של המטופל בטלגרם.</p>', 'מעולה!', '🚀');
                }, 400);
            }
        }

            downloadCalendar();
            setTimeout(() => {

                    `<div class="text-right space-y-3 mt-2 text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">

                    </div>`, 'הבנתי, תודה!', '📅');
            }, 500);
        }

        function downloadCalendar() {
            const formatDateForICS = (date, hours, minutes) => {
                const d = new Date(date);
                const pad = (n) => n < 10 ? '0' + n : n;
                return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}T${pad(hours)}${pad(minutes)}00`;
            };

            const dtStartMorning = formatDateForICS(START_DATE, 7, 30);
            const dtEndMorning = formatDateForICS(START_DATE, 8, 0); 
            const dtStartEvening = formatDateForICS(START_DATE, 19, 30);
            const dtEndEvening = formatDateForICS(START_DATE, 20, 0);

            const icsData = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Tracker App//IL
BEGIN:VEVENT
SUMMARY:☀️ המסע שלי - טיפול בוקר
DTSTART:${dtStartMorning}
DTEND:${dtEndMorning}
RRULE:FREQ=DAILY;COUNT=${TOTAL_DAYS}
DESCRIPTION:אל תשכח/י לסמן באפליקציה!
BEGIN:VALARM
ACTION:DISPLAY
DESCRIPTION:הגיע הזמן לטיפול בוקר
TRIGGER:-PT0M
END:VALARM
END:VEVENT
BEGIN:VEVENT
SUMMARY:🌙 המסע שלי - טיפול ערב
DTSTART:${dtStartEvening}
DTEND:${dtEndEvening}
RRULE:FREQ=DAILY;COUNT=${TOTAL_DAYS}
DESCRIPTION:אל תשכח/י לסמן באפליקציה!
BEGIN:VALARM
ACTION:DISPLAY
DESCRIPTION:הגיע הזמן לטיפול ערב
TRIGGER:-PT0M
END:VALARM
END:VEVENT
END:VCALENDAR`;

            const blob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'treatment_reminders.ics';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
