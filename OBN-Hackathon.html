<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אפליקציית ניקוד מתמודדים</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --success: #10B981;
            --error: #EF4444;
            --radius: 16px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: var(--radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 20px; position: relative; }
        
        h1, h2, h3 { text-align: center; color: var(--primary); margin-top: 0; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 2px solid #E5E7EB; border-radius: 8px; font-size: 16px; background: #fff; appearance: none; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        .btn { display: block; width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-bottom: 10px; text-align: center; }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-outline { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-success { background-color: var(--success); }
        
        .screen { display: none; }
        .screen.active { display: block; }

        .progress-wrapper { width: 100%; background: #E5E7EB; border-radius: 10px; height: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }

        .team-card { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .team-card h3 { font-size: 18px; margin-bottom: 10px; text-align: right; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .category-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .category-row select { width: 70px; padding: 5px; text-align: center; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid #E5E7EB; }
        th { background: #EEF2FF; }

        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .admin-tabs button { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--primary); cursor: pointer; background: white; color: var(--primary); font-weight: bold; }
        .admin-tabs button.active { background: var(--primary); color: white; }

        #loader { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 100; font-weight: bold; border-radius: var(--radius); }
        .footer { text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 20px; }
        
        .status-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #E5E7EB; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader">טוען...</div>

        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <h1>אפליקציית ניקוד</h1>
            <div class="form-group">
                <label>בחר תחרות:</label>
                <select id="comp-select"><option disabled selected>טוען רשימה...</option></select>
            </div>
            <div class="form-group">
                <label>שם ושם משפחה:</label>
                <input type="text" id="scorer-name" placeholder="הזן שם מלא">
            </div>
            <p id="welcome-error" style="color:red; display:none; text-align:center; font-weight:bold; margin-bottom:10px;"></p>
            <button class="btn" id="btn-start-scoring">התחל ניקוד</button>
            <button class="btn btn-outline" id="btn-to-admin-login">כניסת Admin</button>
        </div>

        <!-- Scoring Screen -->
        <div id="scoring-screen" class="screen">
            <h2 id="scoring-title">ניקוד</h2>
            <div class="progress-wrapper"><div id="progress-fill" class="progress-fill"></div></div>
            <div id="autosave-status" class="status-pill">טרם נשמר מקומית</div>
            <div id="scoring-container"></div>
            <p id="scoring-error" style="color:red; display:none; text-align:center; font-weight:bold;"></p>
            <button class="btn" id="btn-submit-scores">שלח ניקוד סופי</button>
        </div>

        <!-- Admin Login Screen -->
        <div id="admin-login-screen" class="screen">
            <h2>כניסת מנהל</h2>
            <div class="form-group">
                <label>סיסמה:</label>
                <input type="password" id="admin-pass">
            </div>
            <p id="admin-error" style="color:red; display:none; text-align:center;">סיסמה שגויה</p>
            <button class="btn" id="btn-admin-login">היכנס</button>
            <button class="btn btn-outline" id="btn-admin-back">חזור</button>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-panel-screen" class="screen">
            <div class="admin-tabs">
                <button id="tab-edit-btn" class="active">ניהול תחרות</button>
                <button id="tab-results-btn">תוצאות</button>
            </div>

            <div id="admin-edit-section">
                <h3>תחרות חדשה</h3>
                <div class="form-group"><label>תאריך:</label><input type="date" id="admin-comp-date"></div>
                <div class="form-group"><label>שם/מיקום:</label><input type="text" id="admin-comp-name"></div>
                <div id="admin-teams-list"></div>
                <button class="btn btn-outline" id="btn-add-team-row" style="padding:5px">+ הוסף קבוצה</button>
                <button class="btn" id="btn-save-comp" style="margin-top:20px">שמור תחרות ל-DB</button>
            </div>

            <div id="admin-results-section" style="display:none;">
                <h3>תוצאות וציונים</h3>
                <div class="form-group">
                    <label>בחר תחרות:</label>
                    <select id="admin-view-comp-select"></select>
                </div>
                <div id="results-display">בחר תחרות לצפייה</div>
                <button class="btn btn-success" id="btn-export-csv" style="display:none; margin-top:15px;">הורד דוח אקסל (CSV)</button>
            </div>

            <button class="btn btn-outline" id="btn-exit-admin" style="margin-top:20px">יציאה</button>
        </div>

        <!-- Success Screen -->
        <div id="success-screen" class="screen">
            <div style="text-align:center; padding:40px 0;">
                <h2 style="color:var(--success)">הניקוד נשלח בהצלחה!</h2>
                <p id="success-text"></p>
            </div>
            <button class="btn" onclick="location.reload()">חזור להתחלה</button>
        </div>
    </div>

    <div class="footer">Copyright OBN 2026</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABEFpQyeTzFLyeEAB0kIOf4VN-jk7Zt7c",
            authDomain: "obn-hackathon.firebaseapp.com",
            projectId: "obn-hackathon",
            storageBucket: "obn-hackathon.firebasestorage.app",
            messagingSenderId: "673873461849",
            appId: "1:673873461849:web:95b9c73764507c5956a748"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'obn-scoring-app';

        const getCol = (name) => collection(db, 'artifacts', APP_ID, 'public', 'data', name);

        let comps = [];
        let currentComp = null;
        let scorerName = "";
        const CATEGORIES = ["חדשנות", "יישומיות", "מודל עסקי", "אופן ההצגה"];

        // --- Auth & Sync ---
        signInAnonymously(auth).then(() => {
            onSnapshot(getCol('competitions'), (snap) => {
                comps = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const selects = [document.getElementById('comp-select'), document.getElementById('admin-view-comp-select')];
                selects.forEach(s => {
                    if (!s) return;
                    s.innerHTML = '<option value="" disabled selected>-- בחר תחרות --</option>';
                    comps.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.id;
                        opt.innerText = `${c.date} | ${c.name}`;
                        s.appendChild(opt);
                    });
                });
            });
        });

        // --- Navigation ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // --- Scoring Logic ---
        document.getElementById('btn-start-scoring').addEventListener('click', () => {
            const compId = document.getElementById('comp-select').value;
            const name = document.getElementById('scorer-name').value.trim();
            const err = document.getElementById('welcome-error');
            
            if (!compId || name.split(' ').length < 2) {
                err.innerText = "בחר תחרות והזן שם מלא (פרטי ומשפחה)";
                err.style.display = 'block';
                return;
            }
            err.style.display = 'none';
            currentComp = comps.find(c => c.id === compId);
            scorerName = name;
            
            renderScoringForm();
            loadLocalStorage();
            showScreen('scoring-screen');
        });

        function renderScoringForm() {
            const cont = document.getElementById('scoring-container');
            cont.innerHTML = '';
            document.getElementById('scoring-title').innerText = currentComp.name;
            
            currentComp.teams.forEach((team, tIdx) => {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `<h3>${team}</h3>`;
                
                CATEGORIES.forEach((cat, cIdx) => {
                    const row = document.createElement('div');
                    row.className = 'category-row';
                    row.innerHTML = `<span>${cat}</span>`;
                    
                    const sel = document.createElement('select');
                    sel.id = `score-${tIdx}-${cIdx}`;
                    sel.innerHTML = '<option value="">-</option>';
                    [1,2,3,4,5].forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
                    
                    sel.addEventListener('change', runAutoSave);
                    row.appendChild(sel);
                    card.appendChild(row);
                });
                cont.appendChild(card);
            });
            updateProgress();
        }

        function updateProgress() {
            const sels = document.querySelectorAll('#scoring-container select');
            const filled = Array.from(sels).filter(s => s.value).length;
            document.getElementById('progress-fill').style.width = (filled / sels.length * 100) + '%';
        }

        function runAutoSave() {
            updateProgress();
            const data = {};
            document.querySelectorAll('#scoring-container select').forEach(s => data[s.id] = s.value);
            const key = `obn_${currentComp.id}_${scorerName.replace(/\s/g, '_')}`;
            localStorage.setItem(key, JSON.stringify(data));
            document.getElementById('autosave-status').innerText = "נשמר מקומית: " + new Date().toLocaleTimeString();
        }

        function loadLocalStorage() {
            const key = `obn_${currentComp.id}_${scorerName.replace(/\s/g, '_')}`;
            const saved = localStorage.getItem(key);
            if (saved) {
                const data = JSON.parse(saved);
                Object.keys(data).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = data[id];
                });
                updateProgress();
                document.getElementById('autosave-status').innerText = "שוחזר משמירה מקומית";
            }
        }

        document.getElementById('btn-submit-scores').addEventListener('click', async () => {
            const sels = document.querySelectorAll('#scoring-container select');
            const err = document.getElementById('scoring-error');
            
            if (Array.from(sels).some(s => !s.value)) {
                err.innerText = "יש למלא את כל ציוני הקבוצות לפני השליחה";
                err.style.display = 'block';
                return;
            }
            
            document.getElementById('loader').style.display = 'flex';
            const results = {};
            currentComp.teams.forEach((team, tIdx) => {
                results[team] = {};
                CATEGORIES.forEach((cat, cIdx) => {
                    results[team][cat] = parseInt(document.getElementById(`score-${tIdx}-${cIdx}`).value);
                });
            });

            try {
                const docId = `${currentComp.id}_${scorerName.replace(/\s/g, '_')}`;
                await setDoc(doc(getCol('scores'), docId), {
                    compId: currentComp.id,
                    compName: currentComp.name,
                    scorer: scorerName,
                    scores: results,
                    submittedAt: serverTimestamp()
                });
                
                localStorage.removeItem(`obn_${currentComp.id}_${scorerName.replace(/\s/g, '_')}`);
                document.getElementById('success-text').innerText = `תודה על הניקוד, ${scorerName}!`;
                showScreen('success-screen');
            } catch (e) {
                alert("שגיאה בשליחה: " + e.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        });

        // --- Admin Flow ---
        document.getElementById('btn-to-admin-login').addEventListener('click', () => showScreen('admin-login-screen'));
        document.getElementById('btn-admin-back').addEventListener('click', () => showScreen('welcome-screen'));
        
        document.getElementById('btn-admin-login').addEventListener('click', async () => {
            const pass = document.getElementById('admin-pass').value;
            document.getElementById('loader').style.display = 'flex';
            try {
                const adminDoc = await getDoc(doc(getCol('admins'), pass));
                if (adminDoc.exists()) {
                    showScreen('admin-panel-screen');
                    document.getElementById('admin-error').style.display = 'none';
                } else {
                    document.getElementById('admin-error').style.display = 'block';
                }
            } catch (e) {
                alert("שגיאת אימות");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        });

        document.getElementById('tab-edit-btn').addEventListener('click', () => {
            document.getElementById('admin-edit-section').style.display = 'block';
            document.getElementById('admin-results-section').style.display = 'none';
            document.getElementById('tab-edit-btn').className = 'active';
            document.getElementById('tab-results-btn').className = '';
        });

        document.getElementById('tab-results-btn').addEventListener('click', () => {
            document.getElementById('admin-edit-section').style.display = 'none';
            document.getElementById('admin-results-section').style.display = 'block';
            document.getElementById('tab-results-btn').className = 'active';
            document.getElementById('tab-edit-btn').className = '';
        });

        document.getElementById('btn-add-team-row').addEventListener('click', () => {
            const row = document.createElement('div');
            row.style.display = 'flex'; row.style.gap = '5px'; row.style.marginBottom = '10px';
            row.innerHTML = `<input type="text" class="admin-team-input" style="flex:1" placeholder="שם קבוצה">
                             <button style="background:red; color:white; border:none; border-radius:5px; padding:0 10px;">X</button>`;
            row.querySelector('button').onclick = () => row.remove();
            document.getElementById('admin-teams-list').appendChild(row);
        });

        document.getElementById('btn-save-comp').addEventListener('click', async () => {
            const name = document.getElementById('admin-comp-name').value.trim();
            const date = document.getElementById('admin-comp-date').value;
            const teams = Array.from(document.querySelectorAll('.admin-team-input')).map(i => i.value.trim()).filter(v => v);
            
            if (!name || !date || teams.length === 0) {
                alert("אנא מלא שם, תאריך ולפחות קבוצה אחת");
                return;
            }
            
            document.getElementById('loader').style.display = 'flex';
            const id = "c_" + Date.now();
            await setDoc(doc(getCol('competitions'), id), { name, date, teams });
            document.getElementById('loader').style.display = 'none';
            alert("התחרות נוצרה בהצלחה!");
        });

        document.getElementById('admin-view-comp-select').addEventListener('change', async (e) => {
            const id = e.target.value;
            document.getElementById('loader').style.display = 'flex';
            const comp = comps.find(c => c.id === id);
            const scoreSnap = await getDocs(getCol('scores'));
            const allScores = scoreSnap.docs.map(d => d.data()).filter(s => s.compId === id);
            
            const display = document.getElementById('results-display');
            if (allScores.length === 0) {
                display.innerHTML = "<b>אין עדיין הצבעות לתחרות זו.</b>";
                document.getElementById('btn-export-csv').style.display = 'none';
            } else {
                // 1. Calculate Overall Team Averages (Proactive Summary)
                const teamResults = comp.teams.map(team => {
                    let totalVal = 0, count = 0;
                    allScores.forEach(s => {
                        if (s.scores[team]) {
                            const sum = Object.values(s.scores[team]).reduce((a,b) => a+b, 0);
                            totalVal += (sum * 5); // Scaling: 20 max points * 5 = 100
                            count++;
                        }
                    });
                    return { name: team, score: count ? (totalVal / count).toFixed(1) : 0 };
                }).sort((a,b) => b.score - a.score);

                // 2. Calculate Detailed Scores Per Scorer
                const detailedScorerResults = allScores.map(s => {
                    const scorerName = s.scorer;
                    const teamScores = [];
                    Object.keys(s.scores).forEach(team => {
                        const sum = Object.values(s.scores[team]).reduce((a,b) => a+b, 0);
                        teamScores.push({ team: team, score: sum * 5 }); // Convert to 100 scale
                    });
                    
                    // Sort this specific scorer's table descending by score
                    teamScores.sort((a, b) => b.score - a.score);
                    
                    return { name: scorerName, scores: teamScores };
                });

                // 3. Generate HTML
                let htmlOutput = `
                    <p style="text-align:center; font-weight:bold; color:var(--text-muted);">סה"כ מנקדים שהצביעו: ${allScores.length}</p>
                    
                    <h4 style="margin-top:20px; color:var(--primary);">דירוג סופי משוקלל (ממוצע)</h4>
                    <table>
                        <tr><th>קבוצה</th><th>ציון סופי</th></tr>
                        ${teamResults.map(tr => `<tr><td>${tr.name}</td><td>${tr.score}</td></tr>`).join('')}
                    </table>
                    
                    <h3 style="margin-top:30px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">פירוט ניקוד לפי שופטים</h3>
                `;

                detailedScorerResults.forEach(scorerData => {
                    htmlOutput += `
                        <h4 style="margin-top:20px; color:var(--primary-hover);">מנקד: ${scorerData.name}</h4>
                        <table>
                            <tr><th>קבוצה</th><th>ציון שניתן</th></tr>
                            ${scorerData.scores.map(ts => `<tr><td>${ts.team}</td><td>${ts.score}</td></tr>`).join('')}
                        </table>
                    `;
                });

                display.innerHTML = htmlOutput;
                document.getElementById('btn-export-csv').style.display = 'block';
                
                // Store data globally for CSV export
                window.currentResultsForExport = { teamResults, detailedScorerResults };
            }
            document.getElementById('loader').style.display = 'none';
        });

        document.getElementById('btn-export-csv').addEventListener('click', () => {
            const data = window.currentResultsForExport;
            
            // \uFEFF is the Byte Order Mark (BOM) needed so Excel opens Hebrew CSV correctly
            let csv = "\uFEFF"; 
            
            // Add global summary
            csv += "דירוג סופי משוקלל\n";
            csv += "קבוצה,ציון סופי\n";
            data.teamResults.forEach(r => csv += `${r.name},${r.score}\n`);
            
            csv += "\n\n--- פירוט ניקוד לפי שופטים ---\n";
            
            // Add detailed scorer tables
            data.detailedScorerResults.forEach(scorerData => {
                csv += `\nמנקד: ${scorerData.name}\n`;
                csv += "קבוצה,ציון שניתן\n";
                scorerData.scores.forEach(s => csv += `${s.team},${s.score}\n`);
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "OBN_Detailed_Results.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        document.getElementById('btn-exit-admin').onclick = () => location.reload();

    </script>
</body>
</html>
