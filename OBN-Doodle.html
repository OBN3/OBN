<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תאם לי - ניהול זמן חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-google { background-color: white; color: #374151; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .day-block { border: 2px solid #e2e8f0; border-radius: 12px; padding: 1.25rem; background: #ffffff; }
        .time-chip { transition: all 0.15s; border: 1px solid #e2e8f0; cursor: pointer; }
        .time-chip.active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .loader { border-top-color: #2563eb; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .day-col-0 { background-color: #eff6ff; }
        .day-col-1 { background-color: #f0fdf4; }
        .day-col-2 { background-color: #fffbeb; }
        .day-col-3 { background-color: #fdf2f8; }
        .day-col-4 { background-color: #f5f3ff; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="app" class="max-w-6xl mx-auto px-4">
        <!-- Header -->
        <header class="py-8 text-center relative">
            <h1 class="text-5xl font-extrabold text-blue-700 tracking-tight mb-2">תאם לי</h1>
            <p class="text-gray-500 font-light text-lg">ניהול אירועים והצבעות בקליק</p>
            
            <div id="auth-controls" class="mt-4 flex flex-col items-center gap-2">
                <div id="user-status" class="px-3 py-1 bg-white rounded-full border border-gray-100 text-xs text-gray-400"></div>
                <button id="logout-btn" onclick="logout()" class="hidden text-red-500 text-xs hover:underline font-bold">התנתק מהמערכת</button>
            </div>
        </header>

        <!-- Loading -->
        <div id="loading" class="flex flex-col items-center justify-center py-24">
            <div class="loader w-14 h-14 border-4 border-gray-200 rounded-full mb-4"></div>
            <p class="text-gray-400 animate-pulse">טוען נתונים...</p>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="hidden">
            
            <!-- Admin Login View -->
            <div id="view-admin-login" class="hidden animate-in text-center py-16 card p-10 max-w-md mx-auto">
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">🔑</div>
                <h2 class="text-2xl font-bold mb-3">כניסת מנהל</h2>
                <p class="text-gray-500 mb-8">התחבר עם גוגל כדי להקים אירועים חדשים ולנהל את הקיימים.</p>
                <button onclick="loginWithGoogle()" class="btn-google w-full flex items-center justify-center gap-3 px-6 py-4 rounded-xl shadow-sm font-bold text-lg">
                    <svg class="w-6 h-6" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.67l-3.57-2.77c-1.01.67-2.28 1.09-3.71 1.09-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    התחברות עם Google
                </button>
            </div>

            <!-- Admin Dashboard -->
            <div id="view-dashboard" class="hidden animate-in space-y-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold">לוח בקרה</h2>
                    <button onclick="showCreateView()" class="btn-primary px-6 py-3 rounded-xl font-bold">+ אירוע חדש</button>
                </div>
                <div id="events-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- Create Event View -->
            <div id="view-create" class="hidden animate-in">
                <div class="card p-8">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h2 class="text-3xl font-bold text-gray-800">הגדרת אירוע חדש</h2>
                            <p class="text-gray-400 mt-1">מלא את הפרטים ובחר שעות מהלוח</p>
                        </div>
                        <button onclick="updateUI()" class="text-blue-500 hover:underline">חזרה לרשימה</button>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div class="lg:col-span-4 space-y-6">
                            <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                                <label class="block text-sm font-bold text-gray-700 mb-2">שם האירוע</label>
                                <input type="text" id="event-title" class="w-full p-4 bg-white border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="למשל: ישיבת הנהלה">
                                
                                <label class="block text-sm font-bold text-gray-700 mb-2 mt-6">האימייל שלך (לקבלת עדכונים)</label>
                                <input type="email" id="admin-email" class="w-full p-4 bg-white border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="your@email.com">
                                
                                <label class="block text-sm font-bold text-gray-700 mb-2 mt-6">תיאור קצר</label>
                                <textarea id="event-desc" class="w-full p-4 bg-white border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" rows="3" placeholder="כתבו תיאור או סדר יום"></textarea>
                            </div>
                            
                            <button onclick="saveEvent()" class="w-full btn-primary py-4 rounded-xl font-bold text-xl shadow-lg mt-4 flex items-center justify-center gap-2">
                                <span>🚀</span> צור אירוע ושתף
                            </button>
                        </div>

                        <div class="lg:col-span-8">
                            <label class="block text-sm font-bold text-gray-700 mb-4">בחירת מועדים (לחץ על השעות הרצויות)</label>
                            <div id="date-blocks-container" class="space-y-6"></div>
                            <button onclick="addDateBlock()" class="w-full mt-6 border-2 border-dashed border-blue-200 text-blue-600 hover:bg-blue-50 py-4 rounded-xl font-bold text-lg">
                                + הוסף יום נוסף ללוח
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Voting View -->
            <div id="view-vote" class="hidden animate-in">
                <div class="card p-8 mb-8 overflow-hidden">
                    <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-4 mb-8">
                        <div>
                            <h2 id="vote-title" class="text-4xl font-extrabold text-gray-800"></h2>
                            <p id="vote-desc" class="text-gray-500 mt-2 text-lg"></p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <div id="admin-share-box" class="hidden">
                                <button onclick="copyCurrentUrl()" class="flex items-center gap-2 bg-green-50 text-green-700 px-4 py-2 rounded-lg hover:bg-green-100 transition-all font-bold text-sm border border-green-200">
                                    <span>🔗</span> העתק קישור להזמנה
                                </button>
                            </div>
                            <button id="back-home-btn" onclick="window.location.href=window.location.pathname" class="hidden text-blue-600 text-sm font-bold hover:underline">
                                🏠 חזרה ללוח הבקרה שלי
                            </button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto rounded-xl border border-gray-100 shadow-inner">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr id="table-date-header">
                                    <th class="p-4 border-b text-right font-bold w-48 sticky right-0 bg-white z-10">האימייל שלכם</th>
                                </tr>
                                <tr id="table-time-header" class="bg-white">
                                    <th class="p-4 border-b sticky right-0 bg-white z-10"></th>
                                </tr>
                            </thead>
                            <tbody id="votes-body"></tbody>
                            <tfoot>
                                <tr class="bg-blue-50/50">
                                    <td class="p-4 border-t sticky right-0 bg-blue-50 z-10">
                                        <input type="email" id="voter-email" class="w-full p-3 bg-white border border-blue-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-400 font-bold" placeholder="your@email.com">
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                    
                    <div class="mt-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <p class="text-gray-400 text-sm italic">* האימייל נדרש כדי שנוכל לעדכן את המנהל על בחירתכם.</p>
                        <button onclick="submitVote()" class="btn-primary w-full md:w-auto px-12 py-3 rounded-xl font-bold text-lg">
                            שלח את הבחירה שלי
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <template id="day-block-template">
        <div class="day-block animate-in relative shadow-sm">
            <button onclick="this.parentElement.remove()" class="absolute -top-3 -left-3 w-8 h-8 bg-white border border-red-100 text-red-500 rounded-full shadow-sm hover:bg-red-50 flex items-center justify-center transition-colors z-10">✕</button>
            <div class="flex flex-col md:flex-row md:items-center gap-4 mb-4">
                <input type="date" class="block-date p-2 bg-blue-50 border-0 rounded-lg font-bold text-blue-800 focus:ring-2 focus:ring-blue-300 outline-none w-full md:w-auto">
                <div class="flex gap-2 text-xs font-bold text-gray-400">
                    <button onclick="toggleAllTimes(this, true)" class="hover:text-blue-600">בחר הכל</button>
                    <span>|</span>
                    <button onclick="toggleAllTimes(this, false)" class="hover:text-blue-600">נקה הכל</button>
                </div>
            </div>
            <div class="time-grid grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2"></div>
        </div>
    </template>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBwGHroy14gSPiZSUEIN1Zo4uTKJcDMluA",
            authDomain: "obn-doodle.firebaseapp.com",
            projectId: "obn-doodle",
            storageBucket: "obn-doodle.firebasestorage.app",
            messagingSenderId: "1064191895859",
            appId: "1:1064191895859:web:64d63a57528a9536e67646"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = firebaseConfig.projectId;
        const provider = new GoogleAuthProvider();
        
        // --- אבטחת מנהל על (SECURITY HASH) ---
        // העתק לכאן את מחרוזת ה-Hash שתקבל מהקונסול ברגע שתתחבר
        // דוגמה ל-Hash של "test@gmail.com" היא: "973dfe463c..."
        const SUPER_ADMIN_HASH = "d725fa5fdfa11cbb29f0e74bb5fafd056428791484c6ab396db9f65ed748e73d"; 

        // פונקציית Hash מאובטחת
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message.toLowerCase());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        let user, currentEventId, isSuperAdmin = false;

        window.onload = () => {
            onAuthStateChanged(auth, async (u) => {
                user = u;
                if (user && user.email) {
                    const userHash = await sha256(user.email);
                    isSuperAdmin = (userHash === SUPER_ADMIN_HASH);
                    
                    // כלי עזר עבורך: מדפיס לקונסול את ה-Hash של המשתמש המחובר
                    console.log("%c--- כלי הגדרת אבטחה ---", "color: blue; font-weight: bold;");
                    console.log("המייל המחובר:", user.email);
                    console.log("מחרוזת ה-Hash שלך (העתק אותה לקוד):", userHash);
                    console.log("-----------------------");
                }
                updateUI();
            });
        };

        async function updateUI() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            const urlParams = new URLSearchParams(window.location.search);
            currentEventId = urlParams.get('id');

            const statusEl = document.getElementById('user-status');
            const logoutBtn = document.getElementById('logout-btn');
            const backHomeBtn = document.getElementById('back-home-btn');
            
            if (user) {
                const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
                statusEl.innerHTML = isGoogle ? `שלום, ${user.displayName || user.email} ${isSuperAdmin ? '<span class="text-blue-500 font-bold">(Super Admin)</span>' : ''}` : `מצב אורח`;
                
                if(isGoogle) {
                    logoutBtn.classList.remove('hidden');
                    backHomeBtn.classList.remove('hidden');
                } else {
                    logoutBtn.classList.add('hidden');
                    backHomeBtn.classList.add('hidden');
                }
            }

            if (currentEventId) {
                if (!user) { try { await signInAnonymously(auth); } catch(e) {} return; }
                showVoteView(currentEventId);
            } else {
                const isGoogle = user && user.providerData.some(p => p.providerId === 'google.com');
                if (isGoogle) showDashboard(); else showAdminLogin();
            }
        }

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); } catch (e) { alertBox("התחברות נכשלה."); }
        };
        window.logout = async () => { 
            await signOut(auth); 
            window.location.href = window.location.pathname;
        };

        function hideAll() { 
            ['view-admin-login', 'view-create', 'view-vote', 'view-dashboard'].forEach(id => document.getElementById(id).classList.add('hidden')); 
        }

        function showAdminLogin() { hideAll(); document.getElementById('view-admin-login').classList.remove('hidden'); }
        
        async function showDashboard() {
            hideAll();
            document.getElementById('view-dashboard').classList.remove('hidden');
            const container = document.getElementById('events-list');
            container.innerHTML = '<p class="text-gray-400">טוען אירועים...</p>';
            
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snapshot) => {
                container.innerHTML = '';
                
                // Super Admin רואה הכל, אחרים רואים רק את שלהם
                const visibleEvents = isSuperAdmin 
                    ? snapshot.docs 
                    : snapshot.docs.filter(d => d.data().createdBy === user.uid);
                
                if(visibleEvents.length === 0) {
                    container.innerHTML = '<p class="col-span-full text-center py-10 text-gray-400">אין אירועים להצגה.</p>';
                    return;
                }

                visibleEvents.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'card p-6 flex flex-col justify-between animate-in';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="text-xl font-bold text-gray-800 mb-2">${data.title}</h3>
                                ${isSuperAdmin && data.createdBy !== user.uid ? '<span class="text-[10px] bg-blue-50 text-blue-600 px-2 rounded font-bold">מנוהל ע"י אחר</span>' : ''}
                            </div>
                            <p class="text-gray-500 text-sm mb-4 line-clamp-2">${data.desc || 'אין תיאור'}</p>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <a href="?id=${docSnap.id}" class="flex-1 text-center bg-blue-100 text-blue-700 py-2 rounded-lg font-bold text-sm hover:bg-blue-200 transition">צפה / הצבע</a>
                            <button onclick="confirmDelete('${docSnap.id}')" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg hover:bg-red-100 transition" title="מחק אירוע">🗑️</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        window.confirmDelete = async (id) => {
            if(!confirm("האם אתה בטוח שברצונך למחוק את האירוע? פעולה זו היא סופית.")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
                alertBox("האירוע נמחק בהצלחה.");
            } catch(e) { alertBox("שגיאה במחיקה. וודאו שיש לכם הרשאה."); }
        }

        window.showCreateView = () => {
            hideAll();
            document.getElementById('view-create').classList.remove('hidden');
            if(user.email) document.getElementById('admin-email').value = user.email;
            const container = document.getElementById('date-blocks-container');
            if(container.children.length === 0) addDateBlock();
        };

        const HOURS = ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00'];
        window.addDateBlock = () => {
            const template = document.getElementById('day-block-template');
            const clone = template.content.cloneNode(true);
            const container = document.getElementById('date-blocks-container');
            const block = clone.querySelector('.day-block');
            block.querySelector('.block-date').valueAsDate = new Date();
            const grid = block.querySelector('.time-grid');
            HOURS.forEach(h => {
                const b = document.createElement('button');
                b.className = 'time-chip text-xs py-2 rounded-lg font-medium';
                b.textContent = h; b.onclick = () => b.classList.toggle('active');
                grid.appendChild(b);
            });
            container.appendChild(block);
        }

        window.toggleAllTimes = (btn, s) => {
            btn.closest('.day-block').querySelectorAll('.time-chip').forEach(c => s ? c.classList.add('active') : c.classList.remove('active'));
        }

        window.saveEvent = async () => {
            const title = document.getElementById('event-title').value.trim();
            const email = document.getElementById('admin-email').value.trim();
            const desc = document.getElementById('event-desc').value.trim();
            const blocks = document.querySelectorAll('.day-block');
            let opts = [];
            blocks.forEach(b => {
                const d = b.querySelector('.block-date').value;
                b.querySelectorAll('.time-chip.active').forEach(c => { if(d) opts.push(`${d}T${c.textContent}`); });
            });

            if(!title || !email || opts.length === 0) { alertBox("מלא שם, מייל ולפחות מועד אחד"); return; }
            
            try {
                const ref = doc(collection(db, 'artifacts', appId, 'public', 'data', 'events'));
                await setDoc(ref, { 
                    title, desc, adminEmail: email, options: opts.sort(), 
                    createdBy: user.uid, createdAt: Date.now() 
                });
                updateUI();
            } catch(e) { alertBox("שגיאה בשמירה."); }
        }

        async function showVoteView(id) {
            hideAll();
            document.getElementById('view-vote').classList.remove('hidden');
            const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
            if(!docSnap.exists()) { alertBox("אירוע לא נמצא."); window.location.href = window.location.pathname; return; }
            
            const data = docSnap.data();
            document.getElementById('vote-title').textContent = data.title;
            document.getElementById('vote-desc').textContent = data.desc;
            if(user && data.createdBy === user.uid) document.getElementById('admin-share-box').classList.remove('hidden');

            const dateH = document.getElementById('table-date-header');
            const timeH = document.getElementById('table-time-header');
            const footR = document.querySelector('tfoot tr');

            while(dateH.children.length > 1) dateH.removeChild(dateH.lastChild);
            while(timeH.children.length > 1) timeH.removeChild(timeH.lastChild);
            while(footR.children.length > 1) footR.removeChild(footR.lastChild);

            const grouped = {};
            data.options.forEach(opt => {
                const d = opt.split('T')[0];
                if(!grouped[d]) grouped[d] = [];
                grouped[d].push(opt);
            });

            let globalIdx = 0;
            const sortedDates = Object.keys(grouped).sort();
            sortedDates.forEach((dateKey, colorIdx) => {
                const opts = grouped[dateKey];
                const thD = document.createElement('th');
                thD.className = `p-3 border-b text-center border-x font-bold day-col-${colorIdx % 5}`;
                thD.colSpan = opts.length;
                thD.textContent = new Date(dateKey).toLocaleDateString('he-IL', {weekday:'short', day:'numeric', month:'numeric'});
                dateH.appendChild(thD);

                opts.forEach(o => {
                    const thT = document.createElement('th');
                    thT.className = `p-2 border-b text-center text-xs text-gray-400 day-col-${colorIdx % 5} whitespace-nowrap`;
                    thT.textContent = o.split('T')[1];
                    timeH.appendChild(thT);

                    const td = document.createElement('td');
                    td.className = `p-3 border-b text-center border-x day-col-${colorIdx % 5}`;
                    td.innerHTML = `<input type="checkbox" class="vote-check w-6 h-6 cursor-pointer accent-blue-600" data-idx="${globalIdx++}">`;
                    footR.appendChild(td);
                });
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'votes'), (snap) => {
                const body = document.getElementById('votes-body');
                body.innerHTML = '';
                snap.docs.filter(d => d.data().eventId === id).forEach(d => {
                    const v = d.data();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-4 border-b font-medium text-xs text-gray-500 sticky right-0 bg-white z-10">${v.email}</td>`;
                    data.options.forEach((_, i) => {
                        const ok = v.selections.includes(i);
                        tr.innerHTML += `<td class="p-3 border-b text-center border-x text-2xl">${ok ? '✅' : '❌'}</td>`;
                    });
                    body.appendChild(tr);
                });
            });
        }

        window.submitVote = async () => {
            const email = document.getElementById('voter-email').value.trim();
            const checks = document.querySelectorAll('.vote-check');
            const sels = Array.from(checks).filter(c => c.checked).map(c => parseInt(c.dataset.idx));
            if(!email) { alertBox("הזן אימייל להצבעה."); return; }
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'votes'), {
                    eventId: currentEventId, email, selections: sels, uid: user.uid, timestamp: Date.now()
                });
                document.getElementById('voter-email').value = '';
                checks.forEach(c => c.checked = false);
                alertBox("הצבעתך נשמרה!");
            } catch(e) { alertBox("שגיאה בשליחה."); }
        }

        window.copyCurrentUrl = () => {
            const el = document.createElement('textarea');
            el.value = window.location.href; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el); alertBox("הקישור הועתק!");
        }

        function alertBox(m) {
            const b = document.createElement('div');
            b.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-3 rounded-2xl shadow-2xl z-50 animate-in font-bold text-sm';
            b.textContent = m; document.body.appendChild(b);
            setTimeout(() => { b.classList.add('opacity-0'); setTimeout(() => b.remove(), 500); }, 3000);
        }
    </script>
</body>
</html>
