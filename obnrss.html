<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל הטכנוטיפים החכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 1);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-800 mb-2 tracking-tight">מחולל הטכנוטיפים החכם</h1>
            <p class="text-slate-600">עיבוד והנגשת חדשות טכנולוגיה באמצעות בינה מלאכותית</p>
            <!-- Local context warning -->
            <div id="localWarning" class="hidden mt-4 inline-block bg-amber-50 border border-amber-200 text-amber-800 text-xs px-4 py-2 rounded-full">
                ⚠️ שים לב: הרצה מקומית עלולה להגביל שאיבת נתונים מחלק מהאתרים.
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Side Panel: Settings & Sources -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- API Keys -->
                <div class="glass-card p-6 rounded-2xl shadow-sm border-r-4 border-blue-500">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <span>🔑</span> הגדרות API
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Gemini API Key</label>
                            <input type="password" id="geminiKey" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="הזן מפתח Gemini...">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Groq API Key</label>
                            <input type="password" id="groqKey" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="הזן מפתח Groq...">
                        </div>
                    </div>
                </div>

                <!-- Sources -->
                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <span>📡</span> מקורות מידע
                        </h2>
                        <div class="text-xs space-x-2 space-x-reverse">
                            <button onclick="toggleAllSources(true)" class="text-blue-600 hover:text-blue-800 transition-colors font-semibold">הכל</button>
                            <span class="text-slate-300">|</span>
                            <button onclick="toggleAllSources(false)" class="text-red-600 hover:text-red-800 transition-colors font-semibold">ללא</button>
                        </div>
                    </div>
                    <div id="sourcesList" class="space-y-2 max-h-72 overflow-y-auto pr-2">
                        <!-- Sources injected via JS -->
                    </div>
                    <button onclick="fetchFeeds()" id="fetchBtn" class="w-full mt-6 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-all shadow-lg flex justify-center items-center gap-2 group">
                        <span>טען כתבות אחרונות</span>
                        <div id="fetchLoader" class="loader hidden !border-slate-400 !border-t-white"></div>
                        <span class="group-hover:translate-x-[-4px] transition-transform">←</span>
                    </button>
                </div>
            </div>

            <!-- Main Panel: Articles & Output -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Articles Feed -->
                <div class="glass-card p-6 rounded-2xl shadow-sm min-h-[300px]">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <span>📰</span> כתבות שנמצאו
                    </h2>
                    <div id="articlesList" class="space-y-4 max-h-[450px] overflow-y-auto pr-2 text-slate-500 italic">
                        טרם נטענו כתבות. בחר מקורות ולחץ על "טען כתבות".
                    </div>
                </div>

                <!-- AI Control -->
                <div class="glass-card p-6 rounded-2xl shadow-sm border-t-4 border-indigo-500">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <span>🧠</span> עיבוד בבינה מלאכותית
                    </h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-1">הפרומפט לעיבוד:</label>
                        <textarea id="systemPrompt" rows="4" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm leading-relaxed" placeholder="כתוב כאן את ההנחיות ל-AI...">סכם את הידיעות והצג אותם כטכנוטיפ קצר. התמקד בשורה התחתונה - מה המשתמש יכול לעשות עם זה עכשיו? כתוב בנימה מקצועית אך נגישה בעברית.</textarea>
                    </div>

                    <div class="flex flex-wrap gap-3">
                        <button onclick="summarize('gemini')" class="flex-1 min-w-[140px] bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3 rounded-xl hover:shadow-xl transition-all flex justify-center items-center gap-2">
                            <span>שלח ל-Gemini</span>
                            <div id="geminiLoader" class="loader hidden !border-white !border-t-transparent"></div>
                        </button>
                        <button onclick="summarize('groq')" class="flex-1 min-w-[140px] bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold py-3 rounded-xl hover:shadow-xl transition-all flex justify-center items-center gap-2">
                            <span>שלח ל-Groq</span>
                            <div id="groqLoader" class="loader hidden !border-white !border-t-transparent"></div>
                        </button>
                    </div>
                </div>

                <!-- Result Area -->
                <div id="resultContainer" class="hidden glass-card p-8 rounded-2xl shadow-2xl border-2 border-blue-100 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                        <h2 class="text-2xl font-bold text-slate-800">הטכנוטיפ המוכן</h2>
                        <div class="flex gap-3">
                            <button onclick="copyToClipboard()" class="p-2 hover:bg-blue-50 text-blue-600 rounded-lg transition-colors border border-transparent hover:border-blue-100" title="העתק">📋 העתק</button>
                            <button onclick="exportToWord()" class="p-2 hover:bg-emerald-50 text-emerald-600 rounded-lg transition-colors border border-transparent hover:border-emerald-100" title="ייצוא לוורד">📄 וורד</button>
                        </div>
                    </div>
                    <div id="aiResponse" class="prose max-w-none text-slate-800 leading-relaxed whitespace-pre-wrap text-lg"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const sources = [
            { id: 'xda', name: 'XDA Developers', url: 'https://www.xda-developers.com/feed/' },
            { id: 'htg', name: 'How-To Geek', url: 'https://www.howtogeek.com/feed/' },
            { id: 'toms', name: 'Tom\'s Guide', url: 'https://www.tomsguide.com/feeds/all' },
            { id: 'muo', name: 'MakeUseOf', url: 'https://www.makeuseof.com/feed/' },
            { id: 'gadgety', name: 'גאדג\'טי', url: 'https://www.gadgety.co.il/feed/' },
            { id: 'geektime', name: 'גיקטיים', url: 'https://www.geektime.co.il/feed/' },
            { id: 'verge', name: 'The Verge', url: 'https://www.theverge.com/rss/index.xml' }
        ];

        let allArticles = [];

        function init() {
            // Check if running from file://
            if (window.location.protocol === 'file:') {
                document.getElementById('localWarning').classList.remove('hidden');
            }

            const list = document.getElementById('sourcesList');
            sources.forEach(src => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg transition-colors cursor-pointer group';
                div.innerHTML = `
                    <input type="checkbox" id="check-${src.id}" value="${src.id}" class="w-4 h-4 text-blue-600 rounded cursor-pointer transition-transform group-hover:scale-110">
                    <label for="check-${src.id}" class="flex-1 text-sm font-medium text-slate-700 cursor-pointer">${src.name}</label>
                `;
                list.appendChild(div);
            });
            
            document.getElementById('geminiKey').value = localStorage.getItem('gemini_key') || '';
            document.getElementById('groqKey').value = localStorage.getItem('groq_key') || '';
        }

        function toggleAllSources(checked) {
            document.querySelectorAll('#sourcesList input').forEach(i => i.checked = checked);
        }

        /**
         * Enhanced Proxy fetcher with wider proxy selection and better response handling
         */
        async function fetchWithProxy(url) {
            const proxyConfigs = [
                // 1. AllOrigins (usually most stable but needs manual unpacking)
                { url: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, type: 'json' },
                // 2. Codetabs (Direct proxy, often works for XDA)
                { url: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, type: 'text' },
                // 3. Corsproxy.io (Simple and fast)
                { url: u => `https://corsproxy.io/?${encodeURIComponent(u)}`, type: 'text' },
                // 4. Proxy.wayback (Alternative)
                { url: u => `https://cors-anywhere.mirror.it.com/${u}`, type: 'text' }
            ];

            let lastError = null;
            for (const config of proxyConfigs) {
                try {
                    console.log(`מנסה לשאוב נתונים דרך שרת גיבוי...`);
                    const response = await fetch(config.url(url), {
                        headers: { 
                            'Accept': 'application/xml, text/xml, */*',
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });

                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                    if (config.type === 'json') {
                        const data = await response.json();
                        if (data.contents) return data.contents;
                        throw new Error("JSON invalid structure");
                    } else {
                        const text = await response.text();
                        if (text.trim().startsWith('<') || text.trim().startsWith('<?xml')) return text;
                        throw new Error("Response is not XML");
                    }
                } catch (e) {
                    lastError = e;
                    console.warn(`ניסיון פרוקסי נכשל: ${e.message}`);
                }
            }
            throw new Error(`כל ניסיונות השאיבה נכשלו. ייתכן שהאתר חוסם בוטים או שהרצה מקומית מונעת את החיבור. שגיאה: ${lastError.message}`);
        }

        async function fetchFeeds() {
            const selectedIds = Array.from(document.querySelectorAll('#sourcesList input:checked')).map(i => i.value);
            if (selectedIds.length === 0) {
                alert('אנא בחר לפחות מקור אחד.');
                return;
            }

            const fetchBtn = document.getElementById('fetchBtn');
            const loader = document.getElementById('fetchLoader');
            
            fetchBtn.disabled = true;
            loader.classList.remove('hidden');
            
            const listContainer = document.getElementById('articlesList');
            listContainer.innerHTML = '<div class="flex flex-col items-center py-12"><div class="loader !w-8 !h-8 mb-4"></div><p class="text-slate-600 animate-pulse font-semibold">מעבד את נתוני הפידים...</p></div>';
            
            allArticles = [];
            let errors = [];
            
            for (const id of selectedIds) {
                const source = sources.find(s => s.id === id);
                try {
                    const content = await fetchWithProxy(source.url);
                    
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(content, "text/xml");
                    
                    if (xml.querySelector('parsererror')) throw new Error("קובץ ה-XML לא תקין");

                    const items = Array.from(xml.querySelectorAll('item, entry')).slice(0, 5);

                    items.forEach(item => {
                        const title = item.querySelector('title')?.textContent || 'ללא כותרת';
                        let desc = item.querySelector('description, summary, content')?.textContent || '';
                        desc = desc.replace(/<[^>]*>/g, '').trim().slice(0, 250);
                        const link = item.querySelector('link')?.textContent || item.querySelector('link')?.getAttribute('href') || '#';
                        
                        allArticles.push({ source: source.name, title, desc, link });
                    });
                } catch (e) {
                    console.error(`שגיאה במשיכת ${source.name}:`, e);
                    errors.push(`${source.name}: ${e.message}`);
                }
            }

            displayArticles();
            
            if (errors.length > 0 && allArticles.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-10 bg-red-50 rounded-xl border border-red-200 px-6">
                        <p class="text-red-600 font-bold mb-2 text-lg">שגיאה קריטית בשאיבת הנתונים</p>
                        <p class="text-sm text-red-500 mb-4 leading-relaxed">
                            המערכת לא הצליחה לגשת למקורות המידע. זה קורה בדרך כלל בגלל הרצה מקומית של הקובץ (file://).<br>
                            <strong>פתרון מומלץ:</strong> להעלות את הקובץ לשרת (כמו GitHub Pages) או להשתמש ב-VS Code Live Server.
                        </p>
                        <div class="text-right inline-block text-[11px] bg-white p-4 rounded border border-red-100 max-w-full overflow-auto font-mono">
                            <strong>לוג שגיאות:</strong><br>
                            ${errors.join('<br>')}
                        </div>
                    </div>
                `;
            }

            fetchBtn.disabled = false;
            loader.classList.add('hidden');
        }

        function displayArticles() {
            const listContainer = document.getElementById('articlesList');
            if (allArticles.length === 0) return;

            listContainer.innerHTML = allArticles.map((art, idx) => `
                <div class="p-4 border border-slate-200 rounded-xl hover:border-blue-300 hover:shadow-md transition-all bg-white group">
                    <div class="flex items-start gap-4">
                        <div class="pt-1">
                            <input type="checkbox" checked id="art-${idx}" class="w-5 h-5 art-selector cursor-pointer text-blue-600 rounded">
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full uppercase tracking-tighter">${art.source}</span>
                            </div>
                            <label for="art-${idx}" class="font-bold text-slate-800 mb-2 block leading-snug cursor-pointer group-hover:text-blue-700 transition-colors">${art.title}</label>
                            <p class="text-sm text-slate-500 line-clamp-2 leading-relaxed">${art.desc}...</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function summarize(engine) {
            const geminiKey = document.getElementById('geminiKey').value.trim();
            const groqKey = document.getElementById('groqKey').value.trim();
            const systemPrompt = document.getElementById('systemPrompt').value;
            
            localStorage.setItem('gemini_key', geminiKey);
            localStorage.setItem('groq_key', groqKey);

            const selectedIndices = Array.from(document.querySelectorAll('.art-selector:checked')).map(i => parseInt(i.id.split('-')[1]));
            if (selectedIndices.length === 0) {
                alert('אנא בחר לפחות כתבה אחת מהרשימה.');
                return;
            }

            const dataToProcess = selectedIndices.map(i => `מקור: ${allArticles[i].source}\nכותרת: ${allArticles[i].title}\nתקציר: ${allArticles[i].desc}`).join('\n\n---\n\n');
            const fullPrompt = `${systemPrompt}\n\nלהלן הידיעות שנבחרו לעיבוד:\n${dataToProcess}`;

            document.getElementById(`${engine}Loader`).classList.remove('hidden');
            
            try {
                let responseText = "";
                if (engine === 'gemini') {
                    if (!geminiKey) throw new Error("מפתח ה-API של Gemini חסר.");
                    responseText = await callGemini(geminiKey, fullPrompt);
                } else {
                    if (!groqKey) throw new Error("מפתח ה-API של Groq חסר.");
                    responseText = await callGroq(groqKey, fullPrompt);
                }

                showResult(responseText);
            } catch (error) {
                alert("שגיאה בעיבוד ה-AI: " + error.message);
            } finally {
                document.getElementById(`${engine}Loader`).classList.add('hidden');
            }
        }

        async function callGemini(apiKey, prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }]
            };

            const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "לא התקבלה תשובה מ-Gemini";
        }

        async function callGroq(apiKey, prompt) {
            const url = "https://api.groq.com/openai/v1/chat/completions";
            const payload = {
                model: "llama-3.3-70b-versatile",
                messages: [{ role: "user", content: prompt }]
            };

            const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices?.[0]?.message?.content || "לא התקבלה תשובה מ-Groq";
        }

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status !== 429 && response.status < 500) break; 
                } catch (e) {}
                await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
            }
            throw new Error("נכשלו ניסיונות ההתחברות לשרתי ה-AI. בדוק מפתח API או חיבור רשת.");
        }

        function showResult(text) {
            const container = document.getElementById('resultContainer');
            const display = document.getElementById('aiResponse');
            display.innerText = text;
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            const text = document.getElementById('aiResponse').innerText;
            const temp = document.createElement('textarea');
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert('הטקסט הועתק לקליפבורד בהצלחה!');
        }

        function exportToWord() {
            const text = document.getElementById('aiResponse').innerText;
            const content = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Techno Tip</title>
                <style>
                    body { font-family: 'Arial', sans-serif; direction: rtl; }
                    .content { white-space: pre-wrap; line-height: 1.6; font-size: 14pt; }
                </style>
                </head>
                <body>
                    <h1 style="text-align: center; color: #1e40af;">הטכנוטיפ שלי</h1>
                    <hr>
                    <div class="content">${text}</div>
                </body>
                </html>
            `;
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `techno-tip-${new Date().toLocaleDateString('he-IL')}.doc`;
            link.click();
        }

        window.onload = init;
    </script>
</body>
</html>
