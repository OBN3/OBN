            { id: 36, isActive: true, title: 'תמלול גרסה 2', description: 'אפליקציית תמלול קול לטקסט (Speech to Text) מבוססת זיהוי מתקדם.', url: 'OBN-Transcribe-v2.html', category: 'כלים ופרודוקטיביות', icon: 'mic', iconColor: 'text-amber-600', image: 'images/project-36.png' },
            { id: 37, isActive: true, title: 'יצירת מפת חשיבה', description: 'כלי ויזואלי לפריקת רעיונות, סיעור מוחות וניהול ידע (Mind Mapping).', url: 'OBN-Mindmap-Groq.html', category: 'כלים ופרודוקטיביות', icon: 'share-2', iconColor: 'text-cyan-400', image: 'images/project-37.png' },
            { id: 38, isActive: true, title: 'יצירת מפת חשיבה - גירסה 2', description: 'הדור הבא של מחולל מפות החשיבה עם אפשרויות עריכה ויצוא נרחבות.', url: 'OBN-Mindmaps-Engine.html', category: 'כלים ופרודוקטיביות', icon: 'git-merge', iconColor: 'text-fuchsia-600', image: 'images/project-38.png' }
        ];

        // State
        let isDarkMode = false;
        let searchQuery = '';
        let activeCategory = 'הכל';

        // DOM Elements
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const searchInput = document.getElementById('search-input');
        const categoriesContainer = document.getElementById('categories-container');
        const projectsContainer = document.getElementById('projects-container');
        const emptyState = document.getElementById('empty-state');
        const htmlElement = document.documentElement;
        
        // Modal Elements
        const contactModal = document.getElementById('contact-modal');
        const contactModalContent = document.getElementById('contact-modal-content');

        // Modal Functions
        window.openContactModal = function() {
            contactModal.classList.remove('hidden');
            // מאלץ את הדפדפן לעבד מחדש את המסך לפני הפעלת האנימציה
            void contactModal.offsetWidth;
            contactModal.classList.remove('opacity-0');
            contactModalContent.classList.remove('scale-95');
            contactModalContent.classList.add('scale-100');
        };

        window.closeContactModal = function() {
            contactModal.classList.add('opacity-0');
            contactModalContent.classList.remove('scale-100');
            contactModalContent.classList.add('scale-95');
            // ממתין לסיום האנימציה לפני ההסתרה המוחלטת
            setTimeout(() => {
                contactModal.classList.add('hidden');
            }, 300);
        };

        // Initialize
        function init() {
            document.getElementById('copyright-year').innerText = `© ${new Date().getFullYear()} כל הזכויות שמורות. נבנה באהבה.`;
            renderCategories();
            renderProjects();
            lucide.createIcons();
            
            // Check system preference for dark mode initially
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                toggleTheme();
            }
        }

        // Theme Management
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                htmlElement.classList.add('dark');
                themeIcon.setAttribute('data-lucide', 'sun');
            } else {
                htmlElement.classList.remove('dark');
                themeIcon.setAttribute('data-lucide', 'moon');
            }
            // Re-render icons since we changed the data-lucide attribute
            lucide.createIcons();
        }

        themeToggleBtn.addEventListener('click', toggleTheme);

        // Render Categories
        function renderCategories() {
            categoriesContainer.innerHTML = categories.map(category => {
                const isActive = activeCategory === category;
                const activeClasses = isActive 
                    ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg shadow-indigo-500/30 border-transparent' 
                    : 'bg-white text-slate-600 hover:bg-slate-100 shadow-sm border-slate-200 dark:bg-slate-800/80 dark:text-slate-300 dark:hover:bg-slate-700 dark:border-slate-700';
                
                return `
                    <button 
                        onclick="setCategory('${category}')"
                        class="px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300 border ${activeClasses}"
                    >
                        ${category}
                    </button>
                `;
            }).join('');
        }

        // Set Category and Re-render
        window.setCategory = function(category) {
            activeCategory = category;
            renderCategories();
            renderProjects();
        }

        // Search Handling
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderProjects();
        });

        // Render Projects
        function renderProjects() {
            const filteredProjects = projects.filter(project => {
                // בדיקה אם הפרויקט פעיל - אם לא, התעלם ממנו והסתר אותו
                if (project.isActive === false) return false;

                const matchesSearch = project.title.toLowerCase().includes(searchQuery) || 
                                      project.description.toLowerCase().includes(searchQuery);
                const matchesCategory = activeCategory === 'הכל' || project.category === activeCategory;
                return matchesSearch && matchesCategory;
            });

            if (filteredProjects.length === 0) {
                projectsContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                projectsContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
                
                projectsContainer.innerHTML = filteredProjects.map(project => `
                    <div class="group flex flex-col relative rounded-3xl p-6 transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl backdrop-blur-sm
                        bg-white/80 border border-slate-100 shadow-xl shadow-slate-200/50 hover:border-indigo-200
                        dark:bg-slate-800/60 dark:border-slate-700/50 dark:shadow-slate-900/50 dark:hover:border-indigo-500/50">
                        
                        <!-- Header of card: Icon and Title aligned horizontally -->
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 shadow-inner bg-slate-50 dark:bg-slate-900/80">
                                <i data-lucide="${project.icon}" class="${project.iconColor} w-7 h-7"></i>
                            </div>
                            <h3 class="text-xl font-bold">${project.title}</h3>
                        </div>

                        <!-- תמונת מסך של האפליקציה (נטען בצורה עצלנית לשיפור ביצועים) -->
                        <div class="w-full h-40 bg-slate-100 dark:bg-slate-700/50 rounded-xl mb-4 overflow-hidden relative border border-slate-200/50 dark:border-slate-600/50 shrink-0">
                            <img src="${project.image}" alt="${project.title}" loading="lazy" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.onerror=null; this.src='images/dafulatimage.png';" />
                        </div>

                        <p class="flex-grow mb-6 leading-relaxed text-slate-600 dark:text-slate-400">
                            ${project.description}
                        </p>

                        <!-- כפתור מעבר לאפליקציה -->
                        <a href="${project.url}" class="mt-auto flex items-center justify-center gap-2 w-full py-3 rounded-2xl font-bold transition-all duration-300
                            bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-800
                            dark:bg-slate-700 dark:hover:bg-indigo-600 dark:text-white">
                            <span>עבור לאפליקציה</span>
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                        </a>
                    </div>
                `).join('');
                
                // Initialize icons for newly injected HTML
                lucide.createIcons();
            }
        }

        // Start the app
        init();

    </script>
</body>
</html>
