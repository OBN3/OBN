<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBN Data Migrator - Smart Sync V4.0</title>

    <!-- Firebase SDKs – type=module, אסינכרוני, מאכלס window.fb -->
    <script type="module">
        import { initializeApp, getApps, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = {
            initializeApp, getApps, deleteApp,
            getAuth, signInWithEmailAndPassword,
            getFirestore, collection, doc, setDoc, getDocs
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; direction: rtl; background: #f8fafc; min-height: 100vh; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes success-pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .success-anim { animation: success-pop 0.4s ease-out; }
        #loading-msg {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; flex-direction: column; gap: 1rem;
            color: #64748b; font-family: 'Assistant', sans-serif;
        }
    </style>
</head>
<body>

<div id="root">
    <div id="loading-msg">
        <div style="font-size:2.5rem">⏳</div>
        <div style="font-size:1.2rem;font-weight:600">טוען ממשק...</div>
    </div>
</div>

<script>
(function () {
    var libs = [
        'https://unpkg.com/react@18/umd/react.production.min.js',
        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone/babel.min.js',
        'https://cdn.tailwindcss.com'
    ];

    function loadNext(i, onDone) {
        if (i >= libs.length) { onDone(); return; }
        var s = document.createElement('script');
        s.src = libs[i];
        s.onload  = function () { loadNext(i + 1, onDone); };
        s.onerror = function () {
            document.getElementById('root').innerHTML =
                '<div style="color:red;text-align:center;padding:40px;font-size:1.2rem;font-family:sans-serif">' +
                '❌ שגיאה בטעינת ספריות. בדוק חיבור לאינטרנט ונסה שוב.</div>';
        };
        document.head.appendChild(s);
    }

    loadNext(0, function () {
        var src = document.getElementById('app-jsx').textContent;


        // ✅ התיקון הקריטי: sourceType:'script' מונע מ-Babel לפלוט import/export
        var compiled = Babel.transform(src, {
            presets: ['react'],
            sourceType: 'script'
        }).code;


        var s = document.createElement('script');
        s.textContent = compiled;
        document.body.appendChild(s);
    });
})();
</script>

<!-- קוד JSX – שמור כ-text/plain כדי שהדפדפן לא יריץ אותו ישירות -->
<script id="app-jsx" type="text/plain">
var useState   = React.useState;
var useEffect  = React.useEffect;
var STORAGE_KEYS = {
    CONFIG: 'obn_migrator_config',
    EMAIL:  'obn_migrator_email',
    PASS:   'obn_migrator_pass'
};

function App() {
    var s_activeTab    = useState('json');
    var activeTab      = s_activeTab[0], setActiveTab    = s_activeTab[1];
    var s_configInput  = useState('');
    var configInput    = s_configInput[0],  setConfigInput  = s_configInput[1];


    var s_email        = useState('');
    var email          = s_email[0],        setEmail        = s_email[1];


    var s_password     = useState('');
    var password       = s_password[0],     setPassword     = s_password[1];


    var s_showPass     = useState(false);
    var showPass       = s_showPass[0],     setShowPass     = s_showPass[1];


    var s_jsonContent  = useState('');
    var jsonContent    = s_jsonContent[0],  setJsonContent  = s_jsonContent[1];


    var s_saveStatus   = useState(false);
    var saveStatus     = s_saveStatus[0],   setSaveStatus   = s_saveStatus[1];


    var s_manualNotes  = useState([{ id: Date.now(), title: '', content: '', date: new Date().toLocaleDateString('he-IL') }]);
    var manualNotes    = s_manualNotes[0],  setManualNotes  = s_manualNotes[1];


    var s_status       = useState('Ready');
    var status         = s_status[0],       setStatus       = s_status[1];


    var s_progress     = useState(0);
    var progress       = s_progress[0],     setProgress     = s_progress[1];


    var s_isRunning    = useState(false);
    var isRunning      = s_isRunning[0],    setIsRunning    = s_isRunning[1];


    var s_stats        = useState({ total: 0, added: 0, skipped: 0 });
    var stats          = s_stats[0],        setStats        = s_stats[1];


    var s_diagInfo     = useState(null);
    var diagInfo       = s_diagInfo[0],     setDiagInfo     = s_diagInfo[1];


    // --- טעינת הגדרות שמורות ---
    useEffect(function () {
        var savedConfig = localStorage.getItem(STORAGE_KEYS.CONFIG);
        var savedEmail  = localStorage.getItem(STORAGE_KEYS.EMAIL);
        var savedPass   = localStorage.getItem(STORAGE_KEYS.PASS);
        if (savedConfig) setConfigInput(savedConfig);
        if (savedEmail)  setEmail(savedEmail);
        if (savedPass)   setPassword(savedPass);
    }, []);

    useEffect(function () { if (configInput) runDiagnostics(); }, [configInput]);
    // --- שמירת הגדרות ---
    function saveSettingsOnly() {
        if (!configInput || !email || !password) {
            setStatus('שגיאה: נא למלא את כל פרטי ההתחברות');
            return;
        }
        localStorage.setItem(STORAGE_KEYS.CONFIG, configInput);
        localStorage.setItem(STORAGE_KEYS.EMAIL,  email);
        localStorage.setItem(STORAGE_KEYS.PASS,   password);
        setSaveStatus(true);
        setTimeout(function () { setSaveStatus(false); }, 2000);
    }
    // --- פירוש Firebase Config ---
    function parseFirebaseConfig(input) {
        try {
            var clean = input.replace(/const\s+\w+\s*=\s*/g, '').replace(/;/g, '').trim();
            if (clean.startsWith('{')) return new Function('return ' + clean)();
            return JSON.parse(input);
        } catch (e) { return null; }
    }
    // --- דיאגנוסטיקה ---
    function runDiagnostics() {
        var cfg = parseFirebaseConfig(configInput);
        if (cfg) {
            setDiagInfo({
                projectId:  cfg.projectId  || 'חסר',
                apiKey:     cfg.apiKey ? cfg.apiKey.substring(0, 10) + '...' : 'חסר',
                authDomain: cfg.authDomain || 'חסר'
            });
        } else {
            setDiagInfo({ error: 'Config לא תקין' });
        }
    }
    // --- יצירת ID יציב לפריט ---
    function generateStableId(item) {
        var str  = (item.title || '') + (item.content || '');
        var hash = 0;
        for (var i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return 'gen_' + Math.abs(hash);
    }
    // --- ניהול שדות Manual ---
    function addManualField() {
        setManualNotes(function (prev) {
            return prev.concat([{ id: Date.now(), title: '', content: '', date: new Date().toLocaleDateString('he-IL') }]);
        });
    }
    function removeManualField(id) {
        setManualNotes(function (prev) {
            if (prev.length === 1)
                return [{ id: Date.now(), title: '', content: '', date: new Date().toLocaleDateString('he-IL') }];
            return prev.filter(function (n) { return n.id !== id; });
        });
    }
    function updateManualField(id, field, value) {
        setManualNotes(function (prev) {
            return prev.map(function (n) {
                if (n.id !== id) return n;
                var updated = Object.assign({}, n);
                updated[field] = value;
                return updated;
            });
        });
    }
    // --- לוגיקת סנכרון ראשית ---
    async function startSync() {
        if (!window.fb) {
            setStatus('שגיאה: ספריות Firebase לא נטענו – רענן את הדף');
            return;
        }

        var cleanEmail     = email.trim();
        var cleanPassword  = password.trim();
        var firebaseConfig = parseFirebaseConfig(configInput);
        if (!firebaseConfig || !cleanEmail || !cleanPassword) {
            setStatus('שגיאה: וודא שכל השדות מלאים וה-Config תקין');
            return;
        }

        var dataToUpload = [];
        if (activeTab === 'json') {
            try { dataToUpload = JSON.parse(jsonContent); }
            catch (e) { setStatus('שגיאה: מבנה JSON לא תקין'); return; }
        } else {
            dataToUpload = manualNotes.filter(function (n) { return n.title.trim() || n.content.trim(); });
            if (!dataToUpload.length) { setStatus('שגיאה: אין נתונים להעלאה'); return; }
        }

        setIsRunning(true);
        setProgress(0);
        setStats({ total: 0, added: 0, skipped: 0 });

        try {
            // ✅ מחק אפליקציות ישנות ואתחל מחדש עם ה-config הנוכחי
            var existingApps = window.fb.getApps();
            for (var ei = 0; ei < existingApps.length; ei++) {
                await window.fb.deleteApp(existingApps[ei]);
            }
            var app = window.fb.initializeApp(firebaseConfig);
            var auth  = window.fb.getAuth(app);
            var db    = window.fb.getFirestore(app);
            var appId = 'obn-tips-v1';
            setStatus('מתחבר לפרויקט: ' + firebaseConfig.projectId + '...');

            // ✅ אימות עם הודעות שגיאה מפורטות
            try {
                await window.fb.signInWithEmailAndPassword(auth, cleanEmail, cleanPassword);
            } catch (authErr) {
                var msgs = {
                    'auth/invalid-credential':   'אימייל או סיסמה שגויים',
                    'auth/user-not-found':        'משתמש לא קיים ב-Firebase Auth',
                    'auth/wrong-password':        'סיסמה שגויה',
                    'auth/invalid-email':         'פורמט אימייל לא תקין',
                    'auth/too-many-requests':     'יותר מדי ניסיונות – נסה שוב מאוחר יותר',
                    'auth/operation-not-allowed': 'Email/Password לא מופעל ב-Firebase Console'
                };
                var msg = msgs[authErr.code] || ('שגיאה לא ידועה: ' + authErr.code);
                throw new Error('אימות נכשל – ' + msg);
            }

            setStatus('סורק דלתא (השוואת נתונים קיימים)...');
            var colRef   = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'techtips');
            var snapshot = await window.fb.getDocs(colRef);
            var existingDocs = {};
            snapshot.forEach(function (d) { existingDocs[d.id] = d.data(); });
            var added = 0, skipped = 0;
            for (var i = 0; i < dataToUpload.length; i++) {
                var item     = dataToUpload[i];
                var docId    = generateStableId(item);
                var existing = existingDocs[docId];
                if (existing && existing.title === item.title && existing.content === item.content) {
                    skipped++;
                } else {
                    await window.fb.setDoc(
                        window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'techtips', docId),
                        {
                            title:   item.title   || 'Untitled',
                            content: item.content || '',
                            labels:  item.labels  || ['טיפ'],
                            date:    item.date    || new Date().toLocaleDateString('he-IL'),
                            rawDate: item.rawDate || Date.now()
                        }
                    );
                    added++;
                }

                setProgress(Math.round(((i + 1) / dataToUpload.length) * 100));
                setStats({ total: dataToUpload.length, added: added, skipped: skipped });
                setStatus('מעבד ' + (i + 1) + '/' + dataToUpload.length + '...');
            }

            setStatus('✅ סנכרון הושלם! ' + added + ' נכתבו, ' + skipped + ' דולגו.');
            saveSettingsOnly();

        } catch (err) {
            setStatus('שגיאה: ' + err.message);
        } finally {
            setIsRunning(false);
        }
    }
    return (
        <div className="max-w-5xl mx-auto p-6 md:p-12 pb-24 space-y-10 text-right">
            <div className="bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-slate-200">

                <header className="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div>
                        <h1 className="text-4xl font-black text-slate-800 mb-2 italic">OBN Smart Sync</h1>
                        <p className="text-slate-500 font-medium">Smart Delta Migration V4.1</p>
                    </div>
                    <div className="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200 shadow-inner">
                        <button onClick={function(){ setActiveTab('json'); }}
                            className={"px-8 py-3 rounded-xl text-sm font-bold tab-transition " + (activeTab === 'json' ? 'bg-white text-slate-900 shadow-md' : 'text-slate-400 hover:text-slate-600')}>
                            JSON Migration
                        </button>
                        <button onClick={function(){ setActiveTab('manual'); }}
                            className={"px-8 py-3 rounded-xl text-sm font-bold tab-transition " + (activeTab === 'manual' ? 'bg-white text-slate-900 shadow-md' : 'text-slate-400 hover:text-slate-600')}>
                            Manual Batch
                        </button>
                    </div>
                </header>

                <div className="grid grid-cols-1 gap-8">

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-xl space-y-6">
                            <div className="flex justify-between items-center">
                                <h3 className="text-yellow-400 font-bold text-xs uppercase tracking-[0.2em]">Credentials</h3>
                                <button onClick={saveSettingsOnly}
                                    className={"flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-black transition-all " + (saveStatus ? 'bg-green-500 text-white success-anim' : 'bg-white/10 text-slate-300 hover:bg-white/20')}>
                                    {saveStatus ? 'נשמר ✓' : 'שמור הגדרות'}
                                </button>
                            </div>
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase mr-1">Admin Email</label>
                                    <input type="email" autoComplete="username"
                                        className="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-yellow-400 transition-all font-mono text-sm text-right"
                                        value={email} onChange={function(e){ setEmail(e.target.value); }} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase mr-1">Password</label>
                                    <div className="relative">
                                        <input type={showPass ? 'text' : 'password'} autoComplete="current-password"
                                            className="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-yellow-400 transition-all font-mono text-sm text-right pr-16"
                                            value={password} onChange={function(e){ setPassword(e.target.value); }} />
                                        <button onClick={function(){ setShowPass(!showPass); }}
                                            className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors text-xs font-bold">
                                            {showPass ? 'הסתר' : 'הצג'}
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {diagInfo && !diagInfo.error && (
                                <div className="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-mono text-slate-400 leading-relaxed">
                                    <div className="text-yellow-400 font-bold mb-1">TARGET: {diagInfo.projectId}</div>
                                    <div>KEY: {diagInfo.apiKey}</div>
                                </div>
                            )}
                            {diagInfo && diagInfo.error && (
                                <div className="bg-red-500/10 p-4 rounded-2xl border border-red-500/30 text-[10px] font-mono text-red-400">
                                    ⚠️ {diagInfo.error}
                                </div>
                            )}
                        </div>

                        <div className="space-y-2 flex flex-col">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2">Firebase Config Object</label>
                            <textarea
                                className="flex-1 min-h-[220px] p-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] font-mono text-[10px] outline-none focus:ring-4 focus:ring-blue-100 transition-all shadow-inner"
                                dir="ltr" placeholder={'{
  apiKey: "...",
  authDomain: "...",
  projectId: "..."
}'}
                                value={configInput} onChange={function(e){ setConfigInput(e.target.value); }} />
                        </div>
                    </div>

                    <div className="border-t border-slate-100 pt-8">
                        {activeTab === 'json' ? (
                            <div className="space-y-3">
                                <label className="text-sm font-bold text-slate-700 mr-2">JSON Migration Content</label>
                                <textarea
                                    className="w-full h-80 p-6 bg-slate-50 border border-slate-200 rounded-[2.5rem] font-mono text-xs outline-none focus:ring-4 focus:ring-blue-50 shadow-inner"
                                    dir="ltr" placeholder='[ { "title": "...", "content": "..." } ]'
                                    value={jsonContent} onChange={function(e){ setJsonContent(e.target.value); }} />
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-green-50/50 p-4 rounded-2xl border border-green-100">
                                    <label className="text-sm font-bold text-green-800">Manual Batch Input</label>
                                    <button onClick={addManualField}
                                        className="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl text-xs font-bold shadow-lg transition-all active:scale-95">
                                        + הוסף שורה
                                    </button>
                                </div>
                                <div className="space-y-6 max-h-[400px] overflow-y-auto p-4 custom-scrollbar bg-slate-50/30 rounded-[2.5rem] border border-dashed border-slate-200">
                                    {manualNotes.map(function(note, index) {
                                        return (
                                            <div key={note.id} className="bg-white border border-slate-200 p-8 rounded-[2rem] relative group shadow-sm hover:shadow-xl transition-all border-r-8 border-r-blue-500">
                                                <button onClick={function(){ removeManualField(note.id); }}
                                                    className="absolute top-6 left-6 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all text-xs font-bold">
                                                    הסר
                                                </button>
                                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 text-right">
                                                    <div className="md:col-span-3 space-y-4">
                                                        <div className="space-y-1">
                                                            <label className="text-[10px] font-black text-slate-400 uppercase">כותרת</label>
                                                            <input type="text"
                                                                className="w-full p-4 bg-slate-50 border-none rounded-xl font-bold text-lg outline-none focus:ring-2 focus:ring-blue-200 text-right"
                                                                value={note.title} onChange={function(e){ updateManualField(note.id, 'title', e.target.value); }} />
                                                        </div>
                                                        <div className="space-y-1">
                                                            <label className="text-[10px] font-black text-slate-400 uppercase">תוכן</label>
                                                            <textarea
                                                                className="w-full h-32 p-4 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-200 text-base leading-relaxed text-right"
                                                                value={note.content} onChange={function(e){ updateManualField(note.id, 'content', e.target.value); }} />
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col justify-start gap-4">
                                                        <div className="space-y-1">
                                                            <label className="text-[10px] font-black text-slate-400 uppercase text-center block">תאריך</label>
                                                            <input type="text"
                                                                className="w-full p-3 bg-slate-50 border-none rounded-xl text-center font-mono text-xs outline-none"
                                                                value={note.date} onChange={function(e){ updateManualField(note.id, 'date', e.target.value); }} />
                                                        </div>
                                                        <div className="mt-auto pt-4 text-center border-t border-slate-100">
                                                            <div className="text-[10px] text-slate-300 font-black italic">ITEM #{index + 1}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-center border-t border-slate-100 pt-10">
                        <div className="lg:col-span-2 space-y-4 text-right">
                            <div className="flex justify-between items-center text-sm font-black text-slate-800 px-2">
                                <span className="uppercase tracking-widest text-blue-600">Progress: {progress}%</span>
                                <span className="text-[11px] text-slate-500 font-mono">{status}</span>
                            </div>
                            <div className="w-full bg-slate-100 h-5 rounded-full overflow-hidden border border-slate-200 p-1 shadow-inner">
                                <div className="bg-gradient-to-r from-blue-600 to-indigo-600 h-full rounded-full transition-all duration-700"
                                    style={{ width: progress + '%' }}></div>
                            </div>
                        </div>
                        <div className="bg-slate-900 rounded-[2rem] p-8 flex justify-around items-center text-center shadow-2xl">
                            <div className="text-white">
                                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Added</div>
                                <div className="text-3xl font-black text-green-400">{stats.added}</div>
                            </div>
                            <div className="w-px h-12 bg-white/10"></div>
                            <div className="text-white">
                                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Skipped</div>
                                <div className="text-3xl font-black text-yellow-400">{stats.skipped}</div>
                            </div>
                        </div>
                    </div>

                    <button onClick={startSync} disabled={isRunning}
                        className={"w-full py-8 rounded-[2.5rem] font-black text-3xl shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-6 " + (isRunning ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-slate-900 text-white hover:bg-black')}>
                        {isRunning ? '⏳ מעבד נתונים...' : '🚀 הפעל סנכרון חכם לענן'}
                    </button>

                </div>
