        // --- ניהול State מקומי ---
        const state = {
            user: null,
            lists: [],
            items: [],
            activeListId: localStorage.getItem('familyCart_lastListId') || null, // פיצ'ר: זוכר רשימה אחרונה
            loading: true,
            searchQuery: '',
            showCompleted: true, // הרשימה פתוחה כברירת מחדל
            hasCelebrated: false // מעקב אחרי קונפטי
        };

        let unsubLists = null;
        let unsubItems = null;
        let html5QrcodeScanner = null;

        // --- אתחול Firebase ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            state.user = user;
            if (user) {
                fetchData();
            } else {
                state.loading = false;
                renderApp();
            }
        });

        function fetchData() {
            if (!state.user) return;
            
            // שליפת רשימות
            const listsRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'lists');
            unsubLists = onSnapshot(listsRef, (snapshot) => {
                state.lists = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                state.lists.sort((a, b) => b.createdAt - a.createdAt);
                
                // אם הרשימה השמורה נמחקה, נאפס
                if (state.activeListId && !state.lists.find(l => l.id === state.activeListId)) {
                    setActiveList(null);
                }
                
                state.loading = false;
                renderApp();
            });

            // שליפת מוצרים
            const itemsRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'items');
            unsubItems = onSnapshot(itemsRef, (snapshot) => {
                state.items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApp(); // נרנדר רק אם הנתונים השתנו
                renderSuggestions(); // עדכון הצעות החיפוש בזמן אמת
            });
        }

        initAuth();

        // --- פונקציות עזר (Actions) ---
        
        window.setActiveList = (listId) => {
            state.activeListId = listId;
            state.searchQuery = ''; // איפוס חיפוש במעבר
            if (listId) {
                localStorage.setItem('familyCart_lastListId', listId);
            } else {
                localStorage.removeItem('familyCart_lastListId');
            }
            renderApp();
        };

        window.createList = async (e) => {
            e.preventDefault();
            const input = document.getElementById('new-list-name');
            const name = input.value.trim();
            if (!name || !state.user) return;
            
            try {
                const listsRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'lists');
                const docRef = await addDoc(listsRef, { name, createdAt: Date.now() });
                input.value = '';
                setActiveList(docRef.id); // מעבר אוטומטי לרשימה החדשה
            } catch (error) { console.error("Error creating list", error); }
        };

        window.deleteList = async (listId) => {
            if (!confirm("האם למחוק רשימה זו?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'lists', listId));
                if (state.activeListId === listId) setActiveList(null);
            } catch (err) { console.error("Error deleting list", err); }
        };

        window.toggleItem = async (itemId, currentStatus) => {
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'items', itemId), { 
                    isBought: !currentStatus 
                });
            } catch (err) { console.error("Error toggling item", err); }
        };

        window.deleteItem = async (itemId) => {
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'items', itemId));
            } catch (err) { console.error("Error deleting item", err); }
        };

        window.showClearModal = () => {
            document.getElementById('clear-modal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeClearModal = () => {
            document.getElementById('clear-modal').classList.add('hidden');
        };

        window.confirmClear = async () => {
            const boughtItems = state.items.filter(i => i.listId === state.activeListId && i.isBought);
            try {
                const promises = boughtItems.map(item => deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'items', item.id)));
                await Promise.all(promises);
                closeClearModal();
            } catch (err) { console.error("Error clearing", err); }
        };

        window.handleSearchInput = (e) => {
            state.searchQuery = e.target.value;
            renderSuggestions();
        };

        // הוספת פריט עם כמות ויחידת מידה
        window.addItem = async (name, category, quantity = 1, unit = "יח'") => {
            if (!name.trim() || !state.user || !state.activeListId) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'items'), {
                    listId: state.activeListId,
                    name: name.trim(),
                    category: category || 'אחר',
                    quantity: parseFloat(quantity) || 1,
                    unit: unit,
                    isBought: false,
                    createdAt: Date.now()
                });
                
                // איפוס טופס הוספה לאחר אישור
                const searchInput = document.getElementById('search-input');
                
                state.searchQuery = '';
                if(searchInput) {
                    searchInput.value = '';
                    searchInput.focus();
                }
                
                renderSuggestions();
            } catch (err) { console.error("Error adding item", err); }
        };

        window.submitCustomItem = (e) => {
            e.preventDefault();
            const input = document.getElementById('search-input');
            
            const val = input.value.trim();

            if(val) {
                // בדיקה אם המוצר קיים במאגר כדי לקחת קטגוריה ויחידת מידה
                const match = DEFAULT_PRODUCTS.find(p => p.name === val);
                addItem(val, match ? match.category : 'אחר', 1, match && match.unit ? match.unit : "יח'");
            }
        };

        // עדכון כמות אונליין מהרשימה
        window.updateItemQty = async (itemId, delta) => {
            const item = state.items.find(i => i.id === itemId);
            if (!item) return;
            const newQty = Math.max(0.5, (parseFloat(item.quantity) || 1) + delta);
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'items', itemId), { quantity: newQty });
            } catch (err) { console.error("Error updating qty", err); }
        };

        window.toggleCompleted = () => {
            state.showCompleted = !state.showCompleted;
            renderApp();
        };

        // --- סורק ברקוד ---
        window.openScanner = () => {
            const modal = document.getElementById('scanner-modal');
            modal.classList.remove('hidden');
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanError)
            .catch(err => {
                alert("שגיאה בגישה למצלמה. ודא שאישרת הרשאות.");
                closeScanner();
            });
        };

        window.closeScanner = () => {
            const modal = document.getElementById('scanner-modal');
            modal.classList.add('hidden');
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); }).catch(console.error);
            }
        };

        document.getElementById('close-scanner').addEventListener('click', closeScanner);

        async function onScanSuccess(decodedText, decodedResult) {
            closeScanner(); // סגירת המצלמה מיד
            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.value = "מחפש מוצר...";
            
            try {
                // שימוש ב-Open Food Facts API
                const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`);
                const data = await res.json();
                
                if (data.status === 1 && data.product) {
                    const productName = data.product.product_name_he || data.product.product_name || 'מוצר חדש';
                    
                    let cat = 'אחר';
                    const pTags = (data.product.categories_tags || []).join(' ').toLowerCase();
                    if (pTags.includes('dairy')) cat = 'מוצרי חלב וביצים';
                    else if (pTags.includes('snack')) cat = 'דגנים וחטיפים';
                    else if (pTags.includes('drink')) cat = 'משקאות';
                    
                    addItem(productName, cat);
                } else {
                    alert("המוצר לא נמצא במאגר הציבורי.");
                    if(searchInput) searchInput.value = "";
                }
            } catch (err) {
                console.error(err);
                alert("שגיאה בתקשורת סורק הברקוד.");
            }
        }

        function onScanError(errorMessage) {
            // התעלמות משגיאות סריקה רגילות (קורה כל פריים שלא מזהה)
        }


        // --- פונקציות רינדור (UI) ---
        const appContainer = document.getElementById('app');

        function renderApp() {
            if (state.loading) {
                appContainer.innerHTML = `
                    <div class="flex-1 flex items-center justify-center text-emerald-500">
                        <i data-lucide="loader-2" class="w-10 h-10 animate-spin"></i>
                    </div>`;
                lucide.createIcons();
                return;
            }

            if (!state.activeListId) {
                appContainer.innerHTML = renderListsManager();
            } else {
                const activeList = state.lists.find(l => l.id === state.activeListId);
                if(activeList) {
                    // כדי לא לאבד פוקוס בזמן הקלדה בחיפוש, נרנדר את כל המעטפת רק אם היא לא קיימת או שהחלפנו רשימה.
                    // ב-Vanilla JS גישה נכונה היא לעדכן רק אלמנטים פנימיים אם אפשר, אבל לצורך הפשטות והיציבות נייצר שלד קבוע ונעדכן את תוכנו.
                    appContainer.innerHTML = renderShoppingListWrapper(activeList);
                    renderDynamicListContent();
                    renderSuggestions();
                } else {
                    setActiveList(null);
                }
            }
            lucide.createIcons();
        }

                                <input type="text" id="search-input" autocomplete="off" oninput="handleSearchInput(event)" placeholder="הקלד שם מוצר להוספה..." 
                                    class="w-full border-gray-200 border bg-gray-50 rounded-2xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white text-base transition-colors font-medium">
                                <button type="button" onclick="openScanner()" class="absolute left-2 top-2 p-1.5 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition-colors shadow-sm" title="סרוק ברקוד">
                                    <i data-lucide="camera" class="w-5 h-5"></i>
                                </button>
                            </div>
                            <button type="submit" class="bg-emerald-500 text-white rounded-2xl px-5 font-bold shadow-md hover:bg-emerald-600 transition-colors shrink-0">
                                הוסף
                            </button>
                        </form>
                        <!-- הצעות חיפוש -->
                        <div id="suggestions-box" class="absolute top-full mt-2 left-0 right-0 bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden z-50 empty:hidden max-h-60 overflow-y-auto"></div>
                    </div>
                </header>

                <main id="list-content" class="flex-1 p-4 space-y-6 overflow-y-auto no-scrollbar bg-gray-50 pb-20 relative"></main>
            `;
        }

        // 3. עדכון דינמי של הצעות חיפוש
        function renderSuggestions() {
            const box = document.getElementById('suggestions-box');
            if (!box) return;

            const q = state.searchQuery.trim();
            if (!q) {
                box.innerHTML = '';
                return;
            }

            // סינון הצעות מתוך המאגר
            const suggestions = DEFAULT_PRODUCTS.filter(p => p.name.includes(q)).slice(0, 6);
            
            // בדיקה האם המוצר כבר קיים ברשימה הפעילה (רק הלא קנויים)
            const activeListItems = state.items.filter(i => i.listId === state.activeListId && !i.isBought);
            const activeItemNames = activeListItems.map(i => i.name);

            if (suggestions.length === 0) {
                box.innerHTML = `<div class="p-4 text-sm text-gray-500 text-center bg-gray-50">לא נמצא במאגר. למטה תוכל לבחור כמות ויחידת מידה וללחוץ "הוסף".</div>`;
                return;
            }

            // פונקציית עזר למניעת שגיאות Syntax כשיש גרשיים כפולים (ק"ג) או יחידים (קוטג') בתוך הפונקציה
            const escapeInline = (str) => {
                if (!str) return '';
                return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            };

            box.innerHTML = suggestions.map(p => {
                const isDuplicate = activeItemNames.includes(p.name);
                const defaultUnitHtml = p.unit ? `<span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded-md border border-gray-200">${p.unit}</span>` : '';
                
                if (isDuplicate) {
                    return `
                        <div class="p-3 flex justify-between items-center border-b border-gray-50 last:border-0 bg-gray-100 opacity-60 cursor-not-allowed">
                            <span class="font-medium text-gray-500 line-through">${p.name}</span>
                            <span class="text-xs font-bold text-gray-500 bg-gray-200 px-2 py-1 rounded-md">כבר ברשימה</span>
                        </div>
                    `;
                } else {
                    return `
                        <div onclick="addItem('${escapeInline(p.name)}', '${escapeInline(p.category)}', 1, '${escapeInline(p.unit || "יח'")}')" class="p-3 hover:bg-emerald-50 cursor-pointer flex justify-between items-center border-b border-gray-50 last:border-0 transition-colors">
                            <span class="font-bold text-gray-800">${p.name}</span>
                            <div class="flex items-center gap-2">
                                ${defaultUnitHtml}
                                <i data-lucide="plus" class="w-4 h-4 text-emerald-500 opacity-50"></i>
                            </div>
                        </div>
                    `;
                }
            }).join('');
            lucide.createIcons();
        }

        // 4. עדכון רשימת המוצרים נטו
        function renderDynamicListContent() {
            const contentDiv = document.getElementById('list-content');
            const progressText = document.getElementById('progress-text');
            const progressBar = document.getElementById('progressBar');
            if (!contentDiv) return;

            const listItems = state.items.filter(i => i.listId === state.activeListId);
            const unbought = listItems.filter(i => !i.isBought);
            const bought = listItems.filter(i => i.isBought);
            const progress = listItems.length === 0 ? 0 : Math.round((bought.length / listItems.length) * 100);

            // עדכון Progress Header
            if(progressText) progressText.innerText = `${unbought.length} נותרו`;
            const pb = document.getElementById('progress-bar');
            if(pb) {
                pb.style.width = listItems.length === 0 ? '0%' : `${progress}%`;
                pb.innerText = progress > 5 ? `${progress}%` : ''; // הצגת אחוזים בתוך הפס
            }

            // לוגיקת קונפטי
            if (progress === 100 && listItems.length > 0 && !state.hasCelebrated) {
                state.hasCelebrated = true;
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    zIndex: 100,
                    colors: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444']
                });
            } else if (progress < 100) {
                state.hasCelebrated = false;
            }

            if (unbought.length === 0 && bought.length === 0) {
                contentDiv.innerHTML = `
                    <div class="text-center text-gray-400 py-20 flex flex-col items-center">
                        <i data-lucide="shopping-cart" class="w-16 h-16 mb-4 opacity-30"></i>
                        <p class="text-lg font-medium">הרשימה ריקה</p>
                        <p class="text-sm mt-1">חפש למעלה והוסף מוצרים</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // קיבוץ לקטגוריות
            const groups = {};
            unbought.forEach(item => {
                const cat = item.category || 'אחר';
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(item);
            });

            let html = '';
            Object.entries(groups).forEach(([category, items]) => {
                const colorClass = CATEGORY_COLORS[category] || CATEGORY_COLORS['אחר'];
                html += `
                    <div class="space-y-2">
                        <h3 class="text-xs font-bold px-3 py-1 inline-block rounded-lg ${colorClass}">
                            ${category}
                        </h3>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden divide-y divide-gray-50">
                            ${items.map(item => `
                                <div class="flex items-center justify-between p-3.5 hover:bg-gray-50 transition-colors group">
                                    <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleItem('${item.id}', false)">
                                        <div class="w-6 h-6 rounded-full flex items-center justify-center border-2 border-gray-300 group-hover:border-emerald-400 transition-colors shrink-0"></div>
                                        <div class="flex flex-col flex-1 min-w-0">
                                            <span class="text-base text-gray-800 font-bold truncate">${item.name}</span>
                                        </div>
                                    </div>
                                    
                                    <!-- בקרת כמות אינליין פרואקטיבית -->
                                    <div class="flex items-center bg-gray-100 rounded-lg p-0.5 ml-2 border border-gray-200 shrink-0">
                                        <button onclick="event.stopPropagation(); updateItemQty('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center text-gray-600 hover:bg-gray-200 active:bg-gray-300 active:scale-95 rounded-md transition-all font-bold text-lg leading-none">-</button>
                                        <span class="text-xs font-bold text-gray-800 w-14 text-center select-none">${item.quantity || 1} ${item.unit || "יח'"}</span>
                                        <button onclick="event.stopPropagation(); updateItemQty('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center text-gray-600 hover:bg-gray-200 active:bg-gray-300 active:scale-95 rounded-md transition-all font-bold text-lg leading-none">+</button>
                                    </div>

                                    <button onclick="deleteItem('${item.id}')" class="p-2 text-gray-300 hover:text-red-500 rounded-xl transition-all shrink-0">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            // פריטים שהושלמו
            if (bought.length > 0) {
                const chevronIcon = state.showCompleted ? 'chevron-up' : 'chevron-down';
                html += `
                    <div class="mt-8 border-t border-gray-200 pt-6 pb-6">
                        <div class="flex items-center justify-between px-2 mb-3">
                            <button onclick="toggleCompleted()" class="flex items-center gap-2 text-gray-500 hover:text-gray-700 font-semibold text-sm transition-colors">
                                הושלמו (${bought.length})
                                <i data-lucide="${chevronIcon}" class="w-4 h-4"></i>
                            </button>
                            ${state.showCompleted ? `
                                <button onclick="showClearModal()" class="text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-red-100 transition-colors">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> נקה הכל
                                </button>
                            ` : ''}
                        </div>
                        
                        ${state.showCompleted ? `
                            <div class="bg-gray-50 rounded-2xl border border-gray-200 overflow-hidden divide-y divide-gray-100 opacity-80">
                                ${bought.map(item => `
                                    <div class="flex items-center justify-between p-3.5 bg-gray-100">
                                        <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleItem('${item.id}', true)">
                                            <div class="w-6 h-6 rounded-full flex items-center justify-center border-2 bg-emerald-500 border-emerald-500 shadow-sm shrink-0">
                                                <i data-lucide="check" class="w-4 h-4 text-white"></i>
                                            </div>
                                            <div class="flex items-center gap-2 text-gray-500 line-through decoration-emerald-500/50">
                                                <span class="text-base">${item.name}</span>
                                                <span class="text-xs bg-gray-200 px-2 py-0.5 rounded-md">${item.quantity || 1} ${item.unit || "יח'"}</span>
                                            </div>
                                        </div>
                                        <button onclick="deleteItem('${item.id}')" class="p-2 text-gray-400 hover:text-red-500 transition-all shrink-0">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            contentDiv.innerHTML = html;
            lucide.createIcons();
        }

    </script>
</body>
</html>
