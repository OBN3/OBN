<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מדד החסינות הדיגיטלית - עידן ה-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .progress-bar { transition: width 0.4s ease-in-out; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .traffic-light-box {
            background: #1a1a1a;
            border-radius: 2rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            width: 240px;
            margin: 1.5rem auto;
        }
        .light {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: all 0.4s ease;
            opacity: 0.2;
            filter: grayscale(1);
        }
        
        .light-red.active { background: #ef4444; opacity: 1; filter: grayscale(0); box-shadow: 0 0 20px #ef4444; }
        .light-orange.active { background: #f59e0b; opacity: 1; filter: grayscale(0); box-shadow: 0 0 20px #f59e0b; }
        .light-green.active { background: #10b981; opacity: 1; filter: grayscale(0); box-shadow: 0 0 20px #10b981; }

        footer { margin-top: auto; }
        
        .btn-selected-yes { background-color: #10b981 !important; color: white !important; box-shadow: 0 0 0 4px #d1fae5; }
        .btn-selected-no { background-color: #ef4444 !important; color: white !important; box-shadow: 0 0 0 4px #fee2e2; }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-xl w-full mx-auto my-auto">
        <!-- Start Screen -->
        <div id="start-screen" class="glass-card p-8 text-center fade-in">
            <div class="mb-6 inline-block p-4 bg-blue-100 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4 text-balance">מדד החסינות הדיגיטלית</h1>
            <p class="text-lg text-gray-600 mb-8">האם אתם מוכנים לעידן ה-AI? בדקו את רמת המוגנות שלכם ב-10 שאלות קצרות וקבלו המלצות אישיות לשיפור.</p>
            <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition duration-300 shadow-lg text-xl">
                בדיקת חסינות
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="glass-card p-8 hidden fade-in relative">
            <div class="flex justify-between items-center mb-6">
                <button id="back-btn" onclick="prevQuestion()" class="text-blue-600 font-bold flex items-center hover:opacity-70 disabled:opacity-30 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    חזרה
                </button>
                <div class="w-1/3 bg-gray-200 rounded-full h-2 mx-2">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full progress-bar" style="width: 10%"></div>
                </div>
                <span id="question-counter" class="text-xs font-semibold text-blue-600 tracking-tight text-left">שאלה 1/10</span>
            </div>
            
            <div id="question-icon" class="text-5xl mb-4 text-center"></div>
            <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-10 min-h-[90px] text-center leading-relaxed"></h2>
            
            <div class="grid grid-cols-2 gap-4">
                <button id="btn-yes" onclick="handleAnswer(true)" class="flex flex-col items-center justify-center bg-white border-2 border-green-500 hover:bg-green-50 text-green-700 font-bold py-6 px-4 rounded-2xl transition-all shadow-sm active:scale-95">
                    <span class="text-3xl mb-1">כן</span>
                </button>
                <button id="btn-no" onclick="handleAnswer(false)" class="flex flex-col items-center justify-center bg-white border-2 border-red-500 hover:bg-red-50 text-red-700 font-bold py-6 px-4 rounded-2xl transition-all shadow-sm active:scale-95">
                    <span class="text-3xl mb-1">לא</span>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="glass-card p-8 hidden fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center text-balance">התוצאה שלך</h2>
            
            <div class="traffic-light-box">
                <div id="light-red" class="light light-red">🚨</div>
                <div id="light-orange" class="light light-orange">⚠️</div>
                <div id="light-green" class="light light-green">🛡️</div>
            </div>

            <div id="score-circle" class="text-5xl font-black mb-2 text-center">0/10</div>
            <h3 id="result-title" class="text-xl font-bold mb-2 italic text-center"></h3>
            
            <div id="prev-score-feedback" class="text-center text-sm font-semibold mb-6 text-blue-800 bg-blue-50 py-3 rounded-lg hidden"></div>
            
            <div id="recommendations-container" class="space-y-4 mb-8 text-right">
                <h4 class="font-bold text-gray-800 border-b pb-2 mb-3">צריכים חיזוק בנקודות הבאות:</h4>
                <div id="recs-list" class="space-y-3"></div>
            </div>

            <div class="space-y-3">
                <button onclick="shareWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center shadow-md transition-colors">
                    <svg class="w-6 h-6 ml-2" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    שלח תוצאות והמלצות בווטסאפ
                </button>
                <button onclick="resetQuiz()" class="w-full text-gray-500 font-semibold py-2 hover:underline">מילוי מחדש</button>
            </div>
        </div>
    </div>

    <footer class="w-full text-center p-6 text-sm text-gray-500 border-t bg-white mt-8">
        פותח על ידי OBN. <a href="mailto:ofirbn@post.com" class="text-blue-600 font-bold hover:underline">צרו קשר</a>
    </footer>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // Firebase Configuration
        // ==========================================
        // אם אתה מריץ את הקובץ בסביבה החיצונית שלך, החלף את האובייקט למטה 
        // בפרטים שקיבלת מה-Firebase Console שלך.
        const manualConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        // לוגיקה לבחירת הקונפיגורציה המתאימה (סביבת Preview או ידנית)
        const firebaseConfig = (typeof __firebase_config !== 'undefined') 
            ? JSON.parse(__firebase_config) 
            : manualConfig;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;

        // Initialize Anonymous Auth
        async function initAuth() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        initAuth();

        const questions = [
            { 
                text: "אם מישהו שאני מכיר מתקשר ומבקש כסף או פרטים אישיים, האם האינסטינקט שלי הוא לנתק ולהתקשר אליו בעצמי למספר ששמור לי באנשי הקשר?", 
                icon: "📞",
                fix: "תמיד לנתק ולהתקשר חזרה למספר השמור. קולות ב-AI יכולים להישמע בדיוק כמו יקיריכם."
            },
            { 
                text: "האם אני מקפיד שלא להזין פרטים רגישים (כמו מספר ת\"ז, פרטי בנק או מידע רפואי) לתוך אפליקציות של צ'אט או בינה מלאכותית?", 
                icon: "🔒",
                fix: "לעולם אל תזינו מידע אישי או רגיש לצ'אטים של AI (כמו ChatGPT) - המידע הזה עשוי להישמר במאגרים שלהם."
            },
            { 
                text: "האם קבעתי עם הילדים או הנכדים 'מילת קוד' סודית כדי שאוכל לוודא שזה באמת הם במקרה של שיחה מוזרה או דחופה?", 
                icon: "🔑",
                fix: "הגדירו עוד היום 'מילת קסם' שרק המשפחה מכירה. זה הכלי הכי חזק נגד זיוף קול (Deepfake)."
            },
            { 
                text: "לפני שאני מעביר הלאה הודעה מרגשת או מפחידה שקיבלתי, האם אני בודק אם היא פורסמה גם באמצעי תקשורת רשמיים?", 
                icon: "📰",
                fix: "אל תפיצו שמועות. בדקו באתרים רשמיים (ynet, N12 וכדומה) לפני שמעבירים הלאה הודעה מפחידה."
            },
            { 
                text: "האם הגדרתי באפליקציית הוואטסאפ שלי 'אימות דו-שלבי' (קוד בן 6 ספרות) כדי למנוע מהאקרים להשתלט לי על החשבון?", 
                icon: "🛡️",
                fix: "כנסו להגדרות וואטסאפ > חשבון > אימות דו-שלבי והגדירו קוד. זה ינעל את החשבון שלכם בפני פריצות."
            },
            { 
                text: "האם אני נמנע מלחיצה על קישורים שמגיעים ב-SMS או בוואטסאפ ממספרים שאינני מכיר, גם אם הם מבטיחים 'פרס' או 'חבילה שמחכה'?", 
                icon: "🔗",
                fix: "קישורים בהודעות ממקור לא מוכר הם הדרך הנפוצה ביותר לגניבת פרטים. פשוט אל תלחצו."
            },
            { 
                text: "האם אני יודע שבינה מלאכותית יכולה ליצור תמונות שנראות אמיתיות לחלוטין, ולכן אני לא מאמין לכל תמונה 'מרעישה' שאני רואה ברשת?", 
                icon: "🖼️",
                fix: "היו סקפטיים. חפשו עיוותים בתמונה (אצבעות מוזרות, רקע מרוח) לפני שאתם מאמינים למה שאתם רואים."
            },
            { 
                text: "האם אני יודע לזהות שדרישה לפעולה 'עכשיו ומיד' (לחץ זמן) היא בדרך כלל סימן ראשון לניסיון הונאה?", 
                icon: "⏳",
                fix: "נוכלים משתמשים בלחץ זמן כדי שלא תחשבו. קיבלתם דרישה דחופה? קחו נשימה עמוקה ותחשדו."
            },
            { 
                text: "האם אני מקפיד לעדכן את הטלפון והאפליקציות שלי כשהמכשיר מבקש זאת?", 
                icon: "🔄",
                fix: "עדכוני תוכנה מכילים תיקוני אבטחה קריטיים. אל תדחו אותם - הם המגן הטכנולוגי שלכם."
            },
            { 
                text: "האם יש לי אדם קרוב שאני סומך עליו (בן משפחה או חבר) שאני מרגיש בנוח להתקשר אליו ולהתייעץ לפני שאני מבצע פעולה דיגיטלית שאני לא בטוח לגביה?", 
                icon: "👥",
                fix: "בחרו 'חבר טלפוני' טכנולוגי שאתם סומכים עליו. התייעצות של דקה יכולה לחסוך עוגמת נפש גדולה."
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);

        window.startQuiz = function() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            updateQuestion();
        };

        function updateQuestion() {
            const total = questions.length;
            const yesBtn = document.getElementById('btn-yes');
            const noBtn = document.getElementById('btn-no');

            yesBtn.classList.remove('btn-selected-yes');
            noBtn.classList.remove('btn-selected-no');

            if (currentQuestion < total) {
                const q = questions[currentQuestion];
                document.getElementById('question-text').innerText = q.text;
                document.getElementById('question-icon').innerText = q.icon;
                document.getElementById('question-counter').innerText = `שאלה ${currentQuestion + 1}/${total}`;
                document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / total) * 100}%`;
                document.getElementById('back-btn').disabled = currentQuestion === 0;

                if (answers[currentQuestion] === true) yesBtn.classList.add('btn-selected-yes');
                else if (answers[currentQuestion] === false) noBtn.classList.add('btn-selected-no');
            } else {
                showResults();
            }
        }

        window.handleAnswer = function(isYes) {
            answers[currentQuestion] = isYes;
            currentQuestion++;
            updateQuestion();
        };

        window.prevQuestion = function() {
            if (currentQuestion > 0) {
                currentQuestion--;
                updateQuestion();
            }
        };

        async function saveToDB(score, answersArray) {
            if (!currentUser || !firebaseConfig.apiKey) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'statistics'), {
                    score: score,
                    answers: answersArray,
                    timestamp: serverTimestamp(),
                    userAgent: navigator.userAgent
                });
            } catch (e) {
                console.error("Error logging stats:", e);
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const finalScore = answers.filter(a => a === true).length;
            const failedIndices = answers.map((a, i) => a === false ? i : null).filter(i => i !== null);
            
            const scoreCircle = document.getElementById('score-circle');
            const resultTitle = document.getElementById('result-title');
            const recsList = document.getElementById('recs-list');
            const feedbackBox = document.getElementById('prev-score-feedback');
            
            scoreCircle.innerText = `${finalScore}/10`;
            recsList.innerHTML = "";

            // Save result to DB automatically
            saveToDB(finalScore, answers);

            const prevScore = localStorage.getItem('obn_ai_last_score');
            if (prevScore !== null) {
                const prev = parseInt(prevScore);
                feedbackBox.classList.remove('hidden');
                if (finalScore > prev) {
                    feedbackBox.innerText = `הציון הקודם שלך היה ${prev}. כל הכבוד על השיפור! 📈`;
                    feedbackBox.className = "text-center text-sm font-semibold mb-6 text-green-800 bg-green-50 py-3 rounded-lg border border-green-200";
                } else if (finalScore < prev) {
                    feedbackBox.innerText = `הציון הקודם שלך היה ${prev}. לא נורא, קראו את ההמלצות ונסו שוב!`;
                    feedbackBox.className = "text-center text-sm font-semibold mb-6 text-red-800 bg-red-50 py-3 rounded-lg border border-red-200";
                } else {
                    feedbackBox.innerText = `שמרתם על רמה יציבה! הציון הקודם היה גם ${prev}.`;
                }
            }
            localStorage.setItem('obn_ai_last_score', finalScore);

            if (failedIndices.length === 0) {
                document.getElementById('recommendations-container').classList.add('hidden');
            } else {
                document.getElementById('recommendations-container').classList.remove('hidden');
                failedIndices.forEach(idx => {
                    const q = questions[idx];
                    const item = document.createElement('div');
                    item.className = "p-3 bg-white border-r-4 border-blue-400 rounded-lg text-sm shadow-sm flex items-start gap-3 text-right";
                    item.innerHTML = `<span>${q.icon}</span> <span>${q.fix}</span>`;
                    recsList.appendChild(item);
                });
            }

            ['red', 'orange', 'green'].forEach(c => document.getElementById(`light-${c}`).classList.remove('active'));

            if (finalScore <= 4) {
                document.getElementById('light-red').classList.add('active');
                scoreCircle.className = "text-5xl font-black mb-2 text-center text-red-600";
                resultTitle.innerText = '"חשופים לאיומים"';
            } else if (finalScore <= 7) {
                document.getElementById('light-orange').classList.add('active');
                scoreCircle.className = "text-5xl font-black mb-2 text-center text-orange-500";
                resultTitle.innerText = '"במסלול הבטוח, אך נדרש שיפור"';
            } else {
                document.getElementById('light-green').classList.add('active');
                scoreCircle.className = "text-5xl font-black mb-2 text-center text-green-600";
                resultTitle.innerText = '"חסינות גבוהה מאוד"';
            }
        }

        window.shareWhatsApp = function() {
            const finalScore = answers.filter(a => a === true).length;
            const failedIndices = answers.map((a, i) => a === false ? i : null).filter(i => i !== null);
            let status = finalScore <= 4 ? "🚨 אדומה (חשופה)" : (finalScore <= 7 ? "⚠️ כתומה (בינונית)" : "✅ ירוקה (חסינה)");
            
            let message = `*מדד החסינות הדיגיטלית שלי לעידן ה-AI*\n\n`;
            message += `התוצאה שלי: *${finalScore}/10*\n`;
            message += `רמת מוגנות: *${status}*\n\n`;
            
            if (failedIndices.length > 0) {
                message += `*הנה מה שלמדתי כדי להגן על עצמי:*\n`;
                failedIndices.forEach((idx, i) => {
                    message += `• ${questions[idx].fix}\n`;
                });
            } else {
                message += `אני מוגן/ת לחלוטין! כל הכבוד לי! 🛡️`;
            }
            
            message += `\nבדקו את עצמכם גם בקישור!`;
            const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        };

        window.resetQuiz = function() {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        };
    </script>
</body>
