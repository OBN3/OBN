<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 1. פרטי ה-Config של ה-Firebase שלך (השאר כפי שהיה)
const firebaseConfig = {
  apiKey: "AIzaSyA3XNbFY9hKq3r7rxGNWtHxCyouX7AQp2U",
  authDomain: "obn-tips.firebaseapp.com",
  projectId: "obn-tips",
  storageBucket: "obn-tips.firebasestorage.app",
  messagingSenderId: "421241406616",
  appId: "1:421241406616:web:fa9bc4b5c719712e823ced",
  measurementId: "G-R1WVQ75PJS"
};


    // אתחול Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const button = document.getElementById('backupBtn');
    const statusDiv = document.getElementById('status');

    button.addEventListener('click', async () => {
        try {
            button.disabled = true;
            statusDiv.innerText = "מושך נתונים מתת-האוסף techtips... ⏳";
            statusDiv.style.color = "#555";

            // 2. פנייה ישירה לנתיב המלא של תת-האוסף שבו נמצאים הטיפים שלך
            const tipsCollectionRef = collection(db, "artifacts", "obn-tips-v1", "public", "data", "techtips");
            
            const querySnapshot = await getDocs(tipsCollectionRef);
            const data = [];

            querySnapshot.forEach((doc) => {
                data.push({ id: doc.id, ...doc.data() });
            });

            if (data.length === 0) {
                statusDiv.innerText = "הנתיב נמצא, אך לא נמצאו רשומות בתוך techtips. ודא שהאיות מדוייק בקונסול.";
                statusDiv.style.color = "#e65100";
                button.disabled = false;
                return;
            }

            statusDiv.innerText = `ההורדה הצליחה! נמצאו ${data.length} רשומות. מייצר קובץ...`;

            // יצירת קובץ ה-JSON והורדתו
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `techtips_backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();

            statusDiv.innerText = "הגיבוי הורד בהצלחה! 🎉";
            statusDiv.style.color = "#2e7d32";
        } catch (error) {
            console.error("שגיאה בגיבוי:", error);
            statusDiv.innerText = "שגיאה: " + error.message;
            statusDiv.style.color = "#c62828";
        } finally {
            button.disabled = false;
        }
    });
</script>
